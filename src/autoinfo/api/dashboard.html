<!doctype html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoInfo Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --cefr-A1: #198754;
      --cefr-A2: #0d6efd;
      --cefr-B1: #ffc107;
      --cefr-B2: #fd7e14;
      --cefr-C1: #dc3545;
      --cefr-C2: #6f42c1;
    }
    [data-bs-theme="dark"] {
      --cefr-B1: #ffca2c;
    }
    .cefr-badge { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.03em; }
    .cefr-A1 { background: var(--cefr-A1); }
    .cefr-A2 { background: var(--cefr-A2); }
    .cefr-B1 { background: var(--cefr-B1); color: #212529 !important; }
    .cefr-B2 { background: var(--cefr-B2); }
    .cefr-C1 { background: var(--cefr-C1); }
    .cefr-C2 { background: var(--cefr-C2); }
    .entry-row { cursor: pointer; transition: background 0.12s; }
    .entry-row:hover { background: rgba(127, 127, 127, 0.12); }
    .tier-pill { font-size: 0.72rem; }
    .truncate-2 {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; text-overflow: ellipsis; max-width: 480px;
    }
    .content-body { white-space: pre-wrap; word-break: break-word; max-height: 60vh; overflow-y: auto; }
    .spinner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 1080; }
    .meta-grid dt { width: 9rem; font-weight: 600; }
    .meta-grid dd { margin-bottom: 0.25rem; }
    .tag-pill { font-size: 0.72rem; }
    .empty-state { padding: 4rem 1rem; text-align: center; color: var(--bs-secondary-color); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">
        <i class="bi bi-collection-fill text-primary me-1"></i>AutoInfo
      </a>
      <span class="navbar-text small text-muted d-none d-md-inline">Read-only knowledge base browser</span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span id="totalCount" class="badge text-bg-secondary">0 entries</span>
        <button id="themeToggle" class="btn btn-sm btn-outline-secondary" title="Toggle dark mode">
          <i class="bi bi-circle-half"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <!-- Filters -->
    <div class="row g-2 mb-3 align-items-center">
      <div class="col-12 col-md-5">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input id="searchInput" type="search" class="form-control" placeholder="Search title & content…" autocomplete="off">
          <button id="clearSearch" class="btn btn-outline-secondary" type="button" title="Clear">&times;</button>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <select id="domainFilter" class="form-select">
          <option value="">All domains</option>
        </select>
      </div>
      <div class="col-6 col-md-2">
        <select id="tierFilter" class="form-select">
          <option value="">All tiers</option>
          <option value="01-Raw">01-Raw</option>
          <option value="02-Draft">02-Draft</option>
          <option value="03-Wiki">03-Wiki</option>
        </select>
      </div>
      <div class="col-6 col-md-2">
        <select id="pageSize" class="form-select">
          <option value="10">10 / page</option>
          <option value="20" selected>20 / page</option>
          <option value="50">50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th style="width: 42%">Title</th>
            <th>Domain</th>
            <th>Tier</th>
            <th>CEFR</th>
            <th>Quality</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="entryTableBody"></tbody>
      </table>
    </div>

    <!-- Empty / loading states -->
    <div id="emptyState" class="empty-state d-none">
      <i class="bi bi-inbox fs-1 d-block mb-2 opacity-50"></i>
      <p class="mb-0">No entries found.</p>
    </div>

    <!-- Pagination -->
    <nav class="d-flex justify-content-between align-items-center mt-3" aria-label="Pagination">
      <span id="pageInfo" class="small text-muted"></span>
      <div class="btn-group btn-group-sm">
        <button id="prevPage" class="btn btn-outline-secondary" disabled>&laquo; Prev</button>
        <button id="nextPage" class="btn btn-outline-secondary" disabled>Next &raquo;</button>
      </div>
    </nav>
  </main>

  <!-- Detail Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="detailTitle">—</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <dl class="meta-grid row mb-3" id="detailMeta"></dl>
          <div id="detailTags" class="mb-3"></div>
          <h6 class="text-muted small text-uppercase">Summary</h6>
          <p id="detailSummary" class="mb-3"></p>
          <h6 class="text-muted small text-uppercase">Content</h6>
          <div id="detailContent" class="content-body border rounded p-3 bg-body-tertiary"></div>
        </div>
        <div class="modal-footer">
          <a id="detailSourceLink" href="#" target="_blank" rel="noopener" class="btn btn-sm btn-outline-primary me-auto d-none">
            <i class="bi bi-box-arrow-up-right"></i> Open source
          </a>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div id="spinner" class="spinner-overlay d-none">
    <div class="spinner-border text-light" role="status"><span class="visually-hidden">Loading…</span></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  (function () {
    "use strict";

    const API = "/api/v1";
    const state = { page: 0, size: 20, total: 0, loading: false, domains: [] };
    const $ = (id) => document.getElementById(id);

    const els = {
      body: $("entryTableBody"),
      empty: $("emptyState"),
      search: $("searchInput"),
      clearSearch: $("clearSearch"),
      domain: $("domainFilter"),
      tier: $("tierFilter"),
      size: $("pageSize"),
      prev: $("prevPage"),
      next: $("nextPage"),
      pageInfo: $("pageInfo"),
      total: $("totalCount"),
      spinner: $("spinner"),
      theme: $("themeToggle"),
      modal: new bootstrap.Modal($("detailModal")),
      detailTitle: $("detailTitle"),
      detailMeta: $("detailMeta"),
      detailTags: $("detailTags"),
      detailSummary: $("detailSummary"),
      detailContent: $("detailContent"),
      detailSourceLink: $("detailSourceLink"),
    };

    const CEFR_COLORS = { A1:"cefr-A1", A2:"cefr-A2", B1:"cefr-B1", B2:"cefr-B2", C1:"cefr-C1", C2:"cefr-C2" };
    const TIER_CLASSES = { "01-Raw":"text-bg-secondary", "02-Draft":"text-bg-info", "03-Wiki":"text-bg-success" };

    function esc(s) {
      if (s == null) return "";
      return String(s).replace(/[&<>"']/g, (c) => (
        { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
      ));
    }

    function fmtDate(s) {
      if (!s) return "—";
      const d = new Date(s);
      if (isNaN(d)) return esc(s);
      return d.toLocaleDateString(undefined, { year:"numeric", month:"short", day:"numeric" });
    }

    function cefrBadge(level) {
      if (!level || level === "unknown") return '<span class="text-muted">—</span>';
      const cls = CEFR_COLORS[level] || "text-bg-secondary";
      return `<span class="badge ${cls} cefr-badge" title="CEFR ${esc(level)}">${esc(level)}</span>`;
    }

    function tierPill(tier) {
      const cls = TIER_CLASSES[tier] || "text-bg-secondary";
      return `<span class="badge ${cls} tier-pill">${esc(tier || "—")}</span>`;
    }

    function qualityStars(q) {
      q = Number(q) || 0;
      if (q <= 0) return '<span class="text-muted">—</span>';
      const filled = Math.min(q, 5);
      let s = "";
      for (let i = 0; i < 5; i++) {
        s += i < filled ? '<i class="bi bi-star-fill text-warning"></i>'
                        : '<i class="bi bi-star text-muted opacity-50"></i>';
      }
      return s;
    }

    function showSpinner(on) { els.spinner.classList.toggle("d-none", !on); }

    function buildQuery() {
      const p = new URLSearchParams();
      p.set("skip", String(state.page * state.size));
      p.set("limit", String(state.size));
      const q = els.search.value.trim();
      if (q) p.set("q", q);
      const d = els.domain.value;
      if (d) p.set("domain", d);
      const t = els.tier.value;
      if (t) p.set("tier", t);
      return p;
    }

    async function loadEntries() {
      if (state.loading) return;
      state.loading = true;
      showSpinner(true);
      try {
        const res = await fetch(`${API}/entries?${buildQuery().toString()}`, { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderTable(data);
      } catch (err) {
        els.body.innerHTML = `<tr><td colspan="6" class="text-danger text-center py-4">
          <i class="bi bi-exclamation-triangle"></i> Failed to load entries: ${esc(err.message)}
        </td></tr>`;
        els.empty.classList.add("d-none");
      } finally {
        state.loading = false;
        showSpinner(false);
      }
    }

    function renderTable(entries) {
      els.body.innerHTML = "";
      if (!entries || entries.length === 0) {
        els.empty.classList.remove("d-none");
        els.pageInfo.textContent = "";
        els.prev.disabled = els.next.disabled = true;
        return;
      }
      els.empty.classList.add("d-none");
      const frag = document.createDocumentFragment();
      for (const e of entries) {
        const tr = document.createElement("tr");
        tr.className = "entry-row";
        tr.dataset.id = e.entry_id;
        tr.innerHTML = `
          <td>
            <div class="fw-semibold text-truncate" style="max-width: 520px" title="${esc(e.title)}">${esc(e.title)}</div>
            <small class="text-muted text-truncate d-block" style="max-width: 520px">${esc(e.source_platform || "")}${e.language ? " · " + esc(e.language) : ""}</small>
          </td>
          <td><span class="badge text-bg-light border">${esc(e.domain || "—")}</span></td>
          <td>${tierPill(e.tier)}</td>
          <td>${cefrBadge(e.cefr)}</td>
          <td>${qualityStars(e.quality_tier)}</td>
          <td><small>${fmtDate(e.collected_at)}</small></td>`;
        tr.addEventListener("click", () => openDetail(e.entry_id));
        frag.appendChild(tr);
      }
      els.body.appendChild(frag);

      const shown = entries.length;
      const skip = state.page * state.size;
      els.pageInfo.textContent = `Showing ${skip + 1}–${skip + shown}` + (state.total ? ` of ${state.total}` : "");
      els.prev.disabled = state.page <= 0;
      els.next.disabled = shown < state.size;
    }

    async function openDetail(id) {
      showSpinner(true);
      try {
        const res = await fetch(`${API}/entries/${encodeURIComponent(id)}`, { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const e = await res.json();
        renderDetail(e);
        els.modal.show();
      } catch (err) {
        alert("Failed to load entry: " + err.message);
      } finally {
        showSpinner(false);
      }
    }

    function renderDetail(e) {
      els.detailTitle.textContent = e.title || "(untitled)";
      const metaRows = [
        ["Entry ID", e.entry_id],
        ["Domain", e.domain],
        ["Tier", e.tier],
        ["CEFR", e.cefr && e.cefr !== "unknown" ? e.cefr : "—"],
        ["Quality tier", e.quality_tier || "—"],
        ["Relevance", e.relevance_score != null ? Number(e.relevance_score).toFixed(2) : "—"],
        ["Dedup", e.dedup_status || "—"],
        ["Source type", e.source_type],
        ["Source platform", e.source_platform],
        ["Language", e.language || "—"],
        ["Collected", fmtDate(e.collected_at)],
        ["File path", e.file_path || "—"],
      ];
      els.detailMeta.innerHTML = metaRows.map(
        ([k, v]) => `<dt class="col-sm-3 text-muted">${esc(k)}</dt><dd class="col-sm-9">${esc(v || "—")}</dd>`
      ).join("");

      els.detailTags.innerHTML = (e.tags && e.tags.length)
        ? e.tags.map((t) => `<span class="badge text-bg-light border tag-pill me-1">#${esc(t)}</span>`).join("")
        : "";

      els.detailSummary.textContent = e.summary || "(no summary)";
      els.detailContent.textContent = e.content || "(no content)";

      if (e.source_url) {
        els.detailSourceLink.href = e.source_url;
        els.detailSourceLink.classList.remove("d-none");
      } else {
        els.detailSourceLink.classList.add("d-none");
      }
    }

    async function loadDomains() {
      try {
        const res = await fetch(`${API}/entries?skip=0&limit=200`, { headers: { "Accept": "application/json" } });
        if (!res.ok) return;
        const data = await res.json();
        const seen = new Set();
        for (const e of data) { if (e.domain) seen.add(e.domain); }
        state.domains = [...seen].sort();
        els.domain.innerHTML = '<option value="">All domains</option>' +
          state.domains.map((d) => `<option value="${esc(d)}">${esc(d)}</option>`).join("");
      } catch (_) { /* non-fatal */ }
    }

    function debounce(fn, ms) {
      let t;
      return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    }

    // --- Event wiring ---
    els.search.addEventListener("input", debounce(() => { state.page = 0; loadEntries(); }, 300));
    els.clearSearch.addEventListener("click", () => { els.search.value = ""; state.page = 0; loadEntries(); });
    els.domain.addEventListener("change", () => { state.page = 0; loadEntries(); });
    els.tier.addEventListener("change", () => { state.page = 0; loadEntries(); });
    els.size.addEventListener("change", () => { state.size = parseInt(els.size.value, 10) || 20; state.page = 0; loadEntries(); });
    els.prev.addEventListener("click", () => { if (state.page > 0) { state.page--; loadEntries(); } });
    els.next.addEventListener("click", () => { state.page++; loadEntries(); });

    // --- Dark mode (auto + toggle, persisted) ---
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-bs-theme", theme);
      localStorage.setItem("autoinfo-theme", theme);
      els.theme.innerHTML = theme === "dark"
        ? '<i class="bi bi-sun-fill"></i>'
        : '<i class="bi bi-moon-fill"></i>';
    }
    (function initTheme() {
      const saved = localStorage.getItem("autoinfo-theme");
      if (saved) { applyTheme(saved); }
      else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        applyTheme("dark");
      }
    })();
    els.theme.addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-bs-theme") || "light";
      applyTheme(cur === "dark" ? "light" : "dark");
    });

    // --- Boot ---
    loadDomains();
    loadEntries();
  })();
  </script>
</body>
</html>
