        final 3.15 beta is out!</description>\n\t<pubDate>Sat, 18 Jul 2026 00:00:00
        +0000</pubDate>\n</item>\n<item>\n\t<title>PyPodcats: Episode 12: With Juanita
        Gomez</title>\n\t<guid>https://pypodcats.live/episodes/ep-12/</guid>\n\t<link>https://pypodcats.live/episodes/ep-12/</link>\n\t<description>Learn
        about Juanita Gomez, a Ph.D. candidate at UC Santa Cruz researching open source
        security. From developing the Spyder IDE to leading community efforts for
        Scientific Python and singing on stage at SciPy, Juanita shares her journey
        in open source.Learn about Juanita Gomez, a Ph.D. candidate at UC Santa Cruz
        researching open source security. From developing the Spyder IDE to leading
        community efforts for Scientific Python and singing on stage at SciPy, Juanita
        shares her journey in open source.&lt;p&gt;We interviewed Juanita Gomez.&lt;/p&gt;\n&lt;p&gt;Juanita
        is a Ph.D. candidate in Computer Science at UC Santa Cruz, where her research
        focuses on improving the\nsecurity of scientific open source software in collaboration
        with the Open Source Program Office (OSPO) at UCSC.\nShe is a former developer
        of the Spyder IDE, and currently one of the community managers for the Scientific
        Python\nproject. She is also part of the organizing committee for the SciPy
        conference.&lt;/p&gt;\n&lt;p&gt;In this episode, Juanita shares how a music
        YouTube channel led her to open source: the video editing skills she\npicked
        up making covers helped her create friendlier documentation, tutorials, and
        videos for Spyder, which caught\nthe attention of the Scientific Python project
        founders. She talks about bridging her security research with her\npassion
        for open source, and gives practical advice for maintainers who want to make
        their projects more secure,\nfrom GitHub&amp;rsquo;s built-in security features
        to the OpenSSF Scorecard. She also opens up about imposter syndrome, being\ndoubly
        underrepresented as a woman and Latina in tech, and how surrounding herself
        with people who elevate her work\nkeeps her growing. And yes, there is singing:
        from auditioning for The X Factor in Colombia as a kid to performing\nlightning
        talk songs with the SciPy 5 at the SciPy conference.&lt;/p&gt;\n&lt;p&gt;Be
        sure to listen to the episode to learn all about Juanita&amp;rsquo;s inspiring
        story!&lt;/p&gt;\n&lt;h2 id=&quot;topic-discussed&quot;&gt;Topic discussed&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;Introductions&lt;/li&gt;\n&lt;li&gt;Getting
        to know Juanita&lt;/li&gt;\n&lt;li&gt;How Juanita joined Spyder and made its
        documentation more friendly&lt;/li&gt;\n&lt;li&gt;Reaching new audiences through
        YouTube tutorials and TikTok&lt;/li&gt;\n&lt;li&gt;Joining the Scientific
        Python project as a community manager&lt;/li&gt;\n&lt;li&gt;Her Ph.D. research
        on open source security at UC Santa Cruz&lt;/li&gt;\n&lt;li&gt;Actionable
        security tips for maintainers: GitHub security features and the OpenSSF Scorecard&lt;/li&gt;\n&lt;li&gt;AI
        and open source security&lt;/li&gt;\n&lt;li&gt;Organizing the Scientific Python
        summits and the SciPy conference&lt;/li&gt;\n&lt;li&gt;Imposter syndrome and
        being a woman and Latina in tech&lt;/li&gt;\n&lt;li&gt;Juanita&amp;rsquo;s
        music journey, from The X Factor in Colombia to singing at SciPy&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h2
        id=&quot;links-from-the-show&quot;&gt;Links from the show&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;Scientific
        Python: &lt;a href=&quot;https://scientific-python.org/&quot; target=&quot;_blank&quot;&gt;https://scientific-python.org/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Spyder
        IDE: &lt;a href=&quot;https://www.spyder-ide.org/&quot; target=&quot;_blank&quot;&gt;https://www.spyder-ide.org/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;OpenSSF
        Scorecard: &lt;a href=&quot;https://scorecard.dev/&quot; target=&quot;_blank&quot;&gt;https://scorecard.dev/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Juanita&amp;rsquo;s
        website: &lt;a href=&quot;https://juanis2112.github.io/&quot; target=&quot;_blank&quot;&gt;https://juanis2112.github.io/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Juanita&amp;rsquo;s
        YouTube channel: &lt;a href=&quot;https://www.youtube.com/@juanitagomezr&quot;
        target=&quot;_blank&quot;&gt;https://www.youtube.com/@juanitagomezr&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;Spyder
