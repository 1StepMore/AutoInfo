        Serr\xE3o: itertools cheatsheet</title>\n\t<guid>https://mathspp.com/blog/itertools-cheatsheet</guid>\n\t<link>https://mathspp.com/blog/itertools-cheatsheet</link>\n\t<description>&lt;img
        alt=&quot;&quot; src=&quot;https://mathspp.com/images/f/b/1/5/e/fb15eb757e36ed758eab1a2578dfddb225e69d62-thumbnail.webp&quot;
        /&gt;\n                                &lt;p&gt;Cheatsheet with visual diagrams
        that explain how the iterables from &lt;code&gt;itertools&lt;/code&gt; work.&lt;/p&gt;\n\n&lt;p&gt;This
        cheatsheet contains diagrams that explain how the iterables from the module
        &lt;code&gt;itertools&lt;/code&gt; work in a visual way.&lt;/p&gt;\n&lt;p&gt;&lt;a
        href=&quot;https://gumroad.com/l/cheatsheet-itertools&quot; class=&quot;btn
        btn-lg btn-center external-link no-image&quot; target=&quot;_blank&quot; rel=&quot;nofollow
        noopener noreferrer&quot;&gt;Download this cheatsheet&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img
        alt=&quot;A4 itertools cheatsheet shown in light and dark themes.&quot; class=&quot;dark-theme-only&quot;
        src=&quot;https://mathspp.com/user/pages/02.blog/itertools-cheatsheet/_cheatsheets-light-front.webp&quot;
        /&gt;&lt;/p&gt;\n&lt;p&gt;&lt;img alt=&quot;A4 itertools cheatsheet shown
        in light and dark themes.&quot; class=&quot;light-theme-only&quot; src=&quot;https://mathspp.com/user/pages/02.blog/itertools-cheatsheet/_cheatsheets-dark-front.webp&quot;
        /&gt;&lt;/p&gt;\n&lt;p&gt;&lt;a href=&quot;https://gumroad.com/l/itertools-uv&quot;
        class=&quot;btn btn-lg btn-center external-link no-image&quot; target=&quot;_blank&quot;
        rel=&quot;nofollow noopener noreferrer&quot;&gt;Download this cheatsheet&lt;/a&gt;&lt;/p&gt;</description>\n\t<pubDate>Mon,
        13 Jul 2026 14:28:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Mike C. Fletcher:
        PyVRML97 2.3.4b1</title>\n\t<guid>http://blog.vrplumber.com/b/2026/07/12/pyvrml97-234b1/</guid>\n\t<link>http://blog.vrplumber.com/b/2026/07/12/pyvrml97-234b1/</link>\n\t<description>&lt;p&gt;Continuing
        on with the Open Source work. PyVRML97 2.3.4b1 is almost all build and CI
        process updates. There are a few minor fixes for modern Python's where bool
        can't be used as a list index and a change for NumPy 2.x array comparison
        failures. This beta is mostly just so that we can pull it from OpenGLContext's
        alpha when it's released.&lt;/p&gt;</description>\n\t<pubDate>Mon, 13 Jul
        2026 01:53:42 +0000</pubDate>\n</item>\n<item>\n\t<title>Bob Belderbos: Learning
        New Skills in the AI Era (vBrownBag)</title>\n\t<guid>https://belderbos.dev/blog/vbrownbag-learning-skills-ai-era/</guid>\n\t<link>https://belderbos.dev/blog/vbrownbag-learning-skills-ai-era/</link>\n\t<description>&lt;p&gt;I
        joined the &lt;a rel=&quot;noopener external&quot; target=&quot;_blank&quot;
        href=&quot;https://vbrownbag.com/&quot;&gt;vBrownBag podcast&lt;/a&gt; with
        &lt;a rel=&quot;noopener external&quot; target=&quot;_blank&quot; href=&quot;https://www.linkedin.com/in/damiankarlson&quot;&gt;Damian&lt;/a&gt;
        to talk about how to actually learn a new language or skill when an agent
        can write the code before you finish typing the prompt.&lt;/p&gt;\n&lt;span
        id=&quot;continue-reading&quot;&gt;&lt;/span&gt;&lt;h2 id=&quot;keep-the-friction-in&quot;&gt;Keep
        the friction in&lt;/h2&gt;\n&lt;p&gt;The thread running through the whole
        conversation is friction. Agents are close to slot machines: a bit of dopamine,
        the path of least resistance, and suddenly you are delegating the thinking,
        not just the typing. The weeks where I hand off the most are the weeks I come
        out least happy with my own skills.&lt;/p&gt;\n&lt;img src=&quot;https://belderbos.dev/images/outsourcing-thinking-drake.png&quot;
        alt=&quot;Drake meme: rejecting outsourcing your thinking to the model, preferring
        to read it yourself and ask where you get stuck&quot; /&gt;\n&lt;p&gt;So I
        keep deliberate friction in the loop. I built coding platforms for &lt;a rel=&quot;noopener
        external&quot; target=&quot;_blank&quot; href=&quot;https://pybitesplatform.com&quot;&gt;Python&lt;/a&gt;
        and &lt;a rel=&quot;noopener external&quot; target=&quot;_blank&quot; href=&quot;https://rustplatform.com&quot;&gt;Rust&lt;/a&gt;
        with no AI in them, on purpose, so you still write the code in the browser
        without assistance.&lt;/p&gt;\n&lt;p&gt;When you are learning something, you
        have to go through the cycles at least once before you let an agent do it
        for you.&lt;/p&gt;\n&lt;p&gt;That is also why I can lean on agents more in
        Python (20 years of programming in, I can smell-test the output) than in a
        language I am still new to.&lt;/p&gt;\n&lt;p&gt;The litmus test is simple:
        how well do I understand the thing I am shipping?&lt;/p&gt;\n&lt;h2 id=&quot;ai-to-explain-not-ai-to-do&quot;&gt;AI
        to explain, not AI to do&lt;/h2&gt;\n&lt;p&gt;AI is remarkable at explaining
        a specific concept. It is dangerous as a crutch for deeper understanding.
        The distinction I keep drawing: use it to explain, not to do the work you
        signed up to learn.&lt;/p&gt;\n&lt;p&gt;We got into where the silent errors
        hide. Reviewed code can look completely plausible and still be only 70% right,
        because you never went deep enough to feel the wrong part (I also discussed
        this recently on &lt;a href=&quot;https://belderbos.dev/blog/complexity-dot-fm-podcast/&quot;&gt;complexity.fm&lt;/a&gt;).&lt;/p&gt;\n&lt;p&gt;On
        &lt;a rel=&quot;noopener external&quot; target=&quot;_blank&quot; href=&quot;https://askthecanon.com&quot;&gt;a
        recent project&lt;/a&gt; the app worked and returned good results, but it
        was silently never searching the second half of every chunk (see &lt;a href=&quot;https://belderbos.dev/blog/semantic-search-without-a-vector-database/&quot;&gt;here&lt;/a&gt;).&lt;/p&gt;\n&lt;p&gt;That
        is the failure mode I see most with students shipping AI-built code, which
        is why I keep coming back to rubber-stamping AI PRs as the real risk.&lt;/p&gt;\n&lt;h2
        id=&quot;learn-by-building-with-tests-as-the-guide&quot;&gt;Learn by building,
        with tests as the guide&lt;/h2&gt;\n&lt;p&gt;When people ask how to learn
        Rust (or anything) without losing ownership, the shape is always the same:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Read
        enough to get the concepts (the first six to eight chapters of the Rust book,
        not all 600 pages).&lt;/li&gt;\n&lt;li&gt;Pick a real project you have a stake
        in, then break it into digestible pieces.&lt;/li&gt;\n&lt;li&gt;Write the
        tests first so you have a definition of done that guides each step.&lt;/li&gt;\n&lt;li&gt;Contrast
        sources: read the reference in parallel, and compare answers across models.&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;In
        the &lt;a rel=&quot;noopener external&quot; target=&quot;_blank&quot; href=&quot;http://scriptertorust.com&quot;&gt;Rust
        cohort&lt;/a&gt; we build a JSON parser this way: tokenizer first, then bindings
        with PyO3, then benchmarking. Several students beat the C parser on performance
        (see &lt;a href=&quot;https://belderbos.dev/blog/josh-rust-cohort-beat-cpython-json&quot;&gt;here&lt;/a&gt;
        and &lt;a href=&quot;https://belderbos.dev/blog/jochen-rust-cohort-beat-cpython/&quot;&gt;here&lt;/a&gt;).&lt;/p&gt;\n&lt;p&gt;This
        only happens because they &lt;strong&gt;owned&lt;/strong&gt; every line instead
        of having an agent generate it.&lt;/p&gt;\n&lt;p&gt;Watch the full conversation:&lt;/p&gt;\n&lt;p&gt;&lt;a
        href=&quot;https://www.youtube.com/watch?v=6DY7GjnQEbo&quot;&gt;Watch on YouTube&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;The
        line I keep repeating: AI is &lt;a href=&quot;https://belderbos.dev/blog/ai-accelerator-needs-direction/&quot;&gt;an
        accelerator, not a compass&lt;/a&gt;. Start with your own thinking, then let
        it help, and keep a high enough bar that you never accept the first draft.&lt;/p&gt;\n&lt;h2
        id=&quot;keep-reading&quot;&gt;Keep reading&lt;/h2&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://belderbos.dev/blog/ai-accelerator-needs-direction/&quot;&gt;The
        AI accelerator needs direction&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://belderbos.dev/blog/ai-doesnt-change-what-software-engineering-is/&quot;&gt;AI
        Doesn't Change What Software Engineering Is&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://belderbos.dev/blog/rust-made-me-a-better-python-developer/&quot;&gt;Learning
        Rust made me a better Python developer&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Thanks
        Damian / vBrownBag for having me on. If you want to stay technical without
        outsourcing the thinking, that is exactly what we work on in the &lt;a rel=&quot;noopener
        external&quot; target=&quot;_blank&quot; href=&quot;https://scriptertorust.com&quot;&gt;Rust&lt;/a&gt;
        and &lt;a rel=&quot;noopener external&quot; target=&quot;_blank&quot; href=&quot;https://pythonagenticai.com&quot;&gt;agentic
        AI&lt;/a&gt; cohorts.&lt;/p&gt;</description>\n\t<pubDate>Mon, 13 Jul 2026
        00:00:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Armin Ronacher: The Tower
        Keeps Rising</title>\n\t<guid>https://lucumr.pocoo.org/2026/7/13/the-tower-keeps-rising/</guid>\n\t<link>https://lucumr.pocoo.org/2026/7/13/the-tower-keeps-rising/</link>\n\t<description>&lt;p&gt;I
        feel that some vibecoded software changes somewhat randomly and unexpectedly.\nThat
        made me think about Bruegel&amp;#8217;s &lt;a href=&quot;https://en.wikipedia.org/wiki/The_Tower_of_Babel_(Bruegel)&quot;&gt;&amp;#8220;The
        Tower of\nBabel&amp;#8221;&lt;/a&gt; which shows\nan already quite chaotic
        depiction of the Tower of Babel.  The story is usually\ntold as one about
        pride and ambition and ultimately why people no longer speak\nthe same language.
        \ But it is also a story about the unity that makes\ntechnological progress
        work.&lt;/p&gt;\n&lt;p&gt;The text begins with a technology upgrade:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;And
        they said one to another, Go to, let us make brick, and burn them\nthoroughly.
        \ And they had brick for stone, and slime had they for morter.&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;They
        use it for a civilizational project:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;let
        us build us a city and a tower, whose top may reach unto heaven&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;But
        when God assesses the situation the bricks are not what concern him:&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;the
        people is one, and they have all one language, [\u2026] and now nothing will
        be\nrestrained from them.&lt;sup class=&quot;footnote-ref&quot; id=&quot;fnref-1&quot;&gt;&lt;a
        href=&quot;https://lucumr.pocoo.org/feed.atom#fn-1&quot;&gt;1&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;\n&lt;/blockquote&gt;\n&lt;p&gt;The
        source of their power is coordination.  They share a language and with that\nshared
        language they can combine their work into something no one of them could\nbuild
        alone.  God does not take away the bricks or their knowledge of how to\nmake
        them.  He takes away their ability to understand one another, and\nconstruction
        stops.&lt;/p&gt;\n&lt;p&gt;There is the appealing idea that AI-assisted programming
        means better tools\nwhich lets us build more ambitious software.  That is
        certainly true at the\nlevel of the individual and without doubt a developer
        with an agent will be\ndramatically more capable of changing a codebase.  But
        large software projects\nhave never been limited only by how quickly an individual
        can produce code.\nThey are limited by how well people can coordinate their
        understanding of the\nsystem they are changing.&lt;/p&gt;\n&lt;p&gt;The shared
        language of a software project is not English or Python but it is the\ncommon
        understanding of what its concepts mean, where the boundaries are, which\ninvariants
        matter, who owns what, and why the system has the shape it does.\nThis language
        is rarely written down in one place.  It lives partly in\ndocumentation and
        code, but also in code review, conversations, arguments, and\nthe experience
        of having to explain a change to somebody else.&lt;/p&gt;\n&lt;p&gt;Before
        agents, some of this shared understanding was maintained by friction.\nIf
        I wanted to change your storage layer, I usually had to read your code, ask\nyou
        questions, and perhaps coordinate with another team whose service depended\non
        it.  This was slow, and much of that slowness was waste but not all of it\nwas.
        \ Some of it was the process by which your understanding became mine, and\nby
        which both of us discovered whether we still agreed about how the system\nworked.
        \ This friction synchronizes people.&lt;/p&gt;\n&lt;p&gt;Agents remove much
        of that friction.  I can ask an agent to add OAuth, you can\nask one to add
        caching, and somebody else can ask one to rebuild the database\nfrom first
        principles and make the UI pink.  Each change can be reasonable in\nisolation.
        \ The code can compile, the tests can pass, and the explanations can\nbe generated
        on demand.  None of us necessarily has to talk to the others, or\neven acquire
        the part of the shared model that the change once would have forced\nus to
        learn.&lt;/p&gt;\n&lt;p&gt;As I said many times before: agents do not feel
        pain, only humans do.  Agents\nnow let us act in parts of the system where
        we would previously have needed\nother people and in code bases where the
        people would have revolted.&lt;/p&gt;\n&lt;p&gt;When I look at some vibecoded
        scaled-up projects the codebases become Babel not\nbecause nobody can communicate,
        but because nobody needs to.  Every developer\nhas a tireless translator that
        can explain a corner of the tower and make\nwhatever local alteration they
        ask of it.  The changes keep landing, even as the\narchitectural language
        that would let the humans reason about them together\ndisappears.&lt;/p&gt;\n&lt;p&gt;But
        it&amp;#8217;s not the biblical story.  At Babel, the loss of common language
        stops\nconstruction whereas in AI-assisted engineering, construction can continue
        after\nshared understanding has already collapsed.  The lack of an immediate
        failure is\nwhat makes it curious and a bit disorienting.  The tower does
        not fall, and so\nwe do not notice what was lost.  It just keeps rising.&lt;/p&gt;\n&lt;div
        class=&quot;footnotes&quot;&gt;\n&lt;ol&gt;\n&lt;li id=&quot;fn-1&quot;&gt;\n&lt;p&gt;&lt;a
        href=&quot;https://www.biblegateway.com/passage/?search=Genesis%2011%3A3-6&amp;version=KJV&quot;&gt;Genesis
        11:3-6, KJV&lt;/a&gt;.&lt;a href=&quot;https://lucumr.pocoo.org/feed.atom#fnref-1&quot;
        class=&quot;footnote&quot;&gt;&amp;#8617;&lt;/a&gt;&lt;/p&gt;&lt;/li&gt;\n&lt;/ol&gt;\n&lt;/div&gt;</description>\n\t<pubDate>Mon,
        13 Jul 2026 00:00:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Christian
        Ledermann: Buzzword Bingo: An Experiment in Spec-Driven AI Development</title>\n\t<guid>https://dev.to/ldrscke/buzzword-bingo-an-experiment-in-spec-driven-ai-development-1m88</guid>\n\t<link>https://dev.to/ldrscke/buzzword-bingo-an-experiment-in-spec-driven-ai-development-1m88</link>\n\t<description>&lt;p&gt;&lt;em&gt;This
        is a submission for &lt;a href=&quot;https://dev.to/challenges/weekend-2026-07-09&quot;&gt;Weekend
        Challenge: Passion Edition&lt;/a&gt;&lt;/em&gt;&lt;/p&gt;\n\n&lt;h2&gt;\n
        \ \n  \n  What I Built\n&lt;/h2&gt;\n\n&lt;p&gt;I built &lt;strong&gt;Buzzword
        Bingo&lt;/strong&gt;, a multiplayer bingo game for conferences, webinars and
        meetings where players mark off the inevitable buzzwords as they appear.&lt;/p&gt;\n\n&lt;p&gt;The
        application allows someone to create a game, share a link with participants,
        and let everyone play along on their own unique bingo board. The first player
        to complete a row, column or diagonal wins.&lt;/p&gt;\n\n&lt;p&gt;Under the
        hood, though, the game itself was almost secondary.&lt;/p&gt;\n\n&lt;p&gt;The
        real goal was to answer a question I had been wondering about for a while:&lt;/p&gt;\n\n&lt;blockquote&gt;\n&lt;p&gt;How
        far can I push Claude with specification-driven development while still achieving
        reliable type coverage and maintaining the coding standards I expect from
        a production Python project?&lt;/p&gt;\n&lt;/blockquote&gt;\n\n&lt;p&gt;The
        project became an experiment in AI-assisted software engineering, strict typing,
        and how much guidance modern coding agents actually need to produce maintainable
        software.&lt;/p&gt;\n\n&lt;h2&gt;\n  \n  \n  Demo\n&lt;/h2&gt;\n\n&lt;p&gt;There
        is no live demo, but you can have a &lt;a href=&quot;https://github.com/cleder/bsbingo/blob/main/docs/user-guide.md&quot;
        rel=&quot;noopener noreferrer&quot;&gt;look at the screenshots&lt;/a&gt; taken
        by &lt;a href=&quot;https://playwright.dev/&quot; rel=&quot;noopener noreferrer&quot;&gt;playwright&lt;/a&gt;
        during testing&lt;/p&gt;\n\n&lt;h2&gt;\n  \n  \n  Code\n&lt;/h2&gt;\n\n&lt;p&gt;Repository:&lt;/p&gt;\n\n&lt;p&gt;&lt;a
        href=&quot;https://github.com/cleder/bsbingo&quot; rel=&quot;noopener noreferrer&quot;&gt;bsbingo
        GitHub repository&lt;/a&gt;&lt;/p&gt;\n\n&lt;h2&gt;\n  \n  \n  How I Built
        It\n&lt;/h2&gt;\n\n&lt;h3&gt;\n  \n  \n  Specification Driven Development\n&lt;/h3&gt;\n\n&lt;p&gt;The
        project followed a specification-driven approach using Speckit.&lt;/p&gt;\n\n&lt;p&gt;Rather
        than iterating directly in code, I created specifications describing what
        the system should do and allowed Claude to implement them.&lt;/p&gt;\n\n&lt;p&gt;A
        big accelerator for the project was using &lt;a href=&quot;https://github.com/getscaf/scaf&quot;
        rel=&quot;noopener noreferrer&quot;&gt;scaf&lt;/a&gt; for the initial bootstrap.
        Rather than spending the first few hours wiring together repository structure,
        CI, containerization, infrastructure, and developer tooling, I started from
        a production-oriented foundation and focused on shaping it to match my own
        preferences. Having Kubernetes manifests, Terraform, deployment pipelines,
        and modern Python tooling available from day one made it much easier to concentrate
        on the actual experiment: how far specification-driven development and AI
        coding agents could take the application.&lt;/p&gt;\n\n&lt;p&gt;I ended up
        needing three major specifications:&lt;/p&gt;\n\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;Project
        scaffolding&lt;/strong&gt;&lt;/li&gt;\n&lt;/ol&gt;\n\n&lt;ul&gt;\n&lt;li&gt;Starting
        from a project generated with &lt;code&gt;scaf&lt;/code&gt;.&lt;/li&gt;\n&lt;li&gt;Refining
        the generated structure to match my personal preferences.&lt;/li&gt;\n&lt;li&gt;Adding
        all the infrastructure and tooling I typically expect in a modern project.&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;Backend
        implementation&lt;/strong&gt;&lt;/li&gt;\n&lt;/ol&gt;\n\n&lt;ul&gt;\n&lt;li&gt;Django
        models and business logic.&lt;/li&gt;\n&lt;li&gt;Server-rendered templates.&lt;/li&gt;\n&lt;li&gt;HTMX
        interactions.&lt;/li&gt;\n&lt;li&gt;Capability URL based authorization.&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;Frontend
        implementation&lt;/strong&gt;&lt;/li&gt;\n&lt;/ol&gt;\n\n&lt;ul&gt;\n&lt;li&gt;Visual
        styling and user experience.&lt;/li&gt;\n&lt;li&gt;Responsive layouts.&lt;/li&gt;\n&lt;li&gt;End-to-end
        testing using Playwright.&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;h3&gt;\n  \n  \n
        \ Django Without the JavaScript Framework\n&lt;/h3&gt;\n\n&lt;p&gt;The application
        uses:&lt;/p&gt;\n\n&lt;ul&gt;\n&lt;li&gt;Django&lt;/li&gt;\n&lt;li&gt;HTMX&lt;/li&gt;\n&lt;li&gt;Django
        templates&lt;/li&gt;\n&lt;li&gt;PostgreSQL&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;p&gt;HTMX
        turned out to be an excellent fit for this type of application.&lt;/p&gt;\n\n&lt;p&gt;Most
        interactions consist of:&lt;/p&gt;\n\n&lt;ul&gt;\n&lt;li&gt;clicking a square,&lt;/li&gt;\n&lt;li&gt;sending
        a POST request,&lt;/li&gt;\n&lt;li&gt;returning an updated HTML fragment,&lt;/li&gt;\n&lt;li&gt;swapping
        it into the page.&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;p&gt;No client-side state
        management was required.&lt;/p&gt;\n\n&lt;h3&gt;\n  \n  \n  Capability URLs\n&lt;/h3&gt;\n\n&lt;p&gt;One
        design decision I particularly liked was using capability URLs instead of
        authentication.&lt;/p&gt;\n\n&lt;p&gt;Each board receives a unique UUID:&lt;br
        /&gt;\n&lt;/p&gt;\n\n&lt;div class=&quot;highlight js-code-highlight&quot;&gt;\n&lt;pre
        class=&quot;highlight plaintext&quot;&gt;&lt;code&gt;/board/5b97b663-1f2f-4e54-8d2f-f45f3272f870/\n&lt;/code&gt;&lt;/pre&gt;\n\n&lt;/div&gt;\n\n\n\n&lt;p&gt;Possession
        of the URL grants access to that board.&lt;/p&gt;\n\n&lt;p&gt;This removes
        the need for:&lt;/p&gt;\n\n&lt;ul&gt;\n&lt;li&gt;user accounts,&lt;/li&gt;\n&lt;li&gt;sessions,&lt;/li&gt;\n&lt;li&gt;authentication,&lt;/li&gt;\n&lt;li&gt;authorization
        logic.&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;p&gt;For a lightweight conference game
        this felt like the right trade-off.&lt;/p&gt;\n\n&lt;h3&gt;\n  \n  \n  Going
        All-In On Type Safety\n&lt;/h3&gt;\n\n&lt;p&gt;I care a lot about clean code
        and strong typing in Python, so I decided to push the type system as far as
        possible.&lt;/p&gt;\n\n&lt;p&gt;Instead of relying on a single type checker,
        I combined:&lt;/p&gt;\n\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=&quot;https://docs.astral.sh/ty/&quot;
        rel=&quot;noopener noreferrer&quot;&gt;&lt;code&gt;ty&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://zubanls.com/&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;code&gt;zuban&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://pyrefly.org/&quot; rel=&quot;noopener noreferrer&quot;&gt;&lt;code&gt;pyrefly&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;p&gt;This
        was paired with a strict &lt;a href=&quot;https://docs.astral.sh/ruff/&quot;
        rel=&quot;noopener noreferrer&quot;&gt;&lt;code&gt;ruff&lt;/code&gt;&lt;/a&gt;
        configuration with almost every rule enabled.&lt;/p&gt;\n\n&lt;p&gt;One of
        the goals of the experiment was to see whether Claude could operate effectively
        within these constraints.&lt;/p&gt;\n\n&lt;h3&gt;\n  \n  \n  What Worked\n&lt;/h3&gt;\n\n&lt;p&gt;This
        instruction worked well:&lt;/p&gt;\n\n&lt;blockquote&gt;\n&lt;p&gt;Prefer
        precise, narrow types (&lt;code&gt;Enum&lt;/code&gt;, &lt;code&gt;NewType&lt;/code&gt;,
        &lt;code&gt;TypedDict&lt;/code&gt;, dataclasses with &lt;code&gt;Final&lt;/code&gt;
        or &lt;code&gt;Literal&lt;/code&gt; fields) over &lt;code&gt;Any&lt;/code&gt;,
        untyped &lt;code&gt;dict&lt;/code&gt; or &lt;code&gt;list&lt;/code&gt;, or
        stringly-typed values. Illegal states should be unrepresentable in the type
        system rather than guarded against only at runtime.&lt;/p&gt;\n&lt;/blockquote&gt;\n\n&lt;p&gt;Once
        Claude had a few examples to follow, it started producing significantly better
        type annotations and more expressive domain models.&lt;/p&gt;\n\n&lt;p&gt;Pre-commit
        hooks proved to be the first line of defence, catching issues before they
        ever reached CI. Linters, formatters, and all three type checkers ran automatically
        on every commit, providing rapid feedback and keeping the codebase consistent
        throughout the experiment.&lt;br /&gt;\nTo avoid spending time hand-crafting
        the configuration, I used &lt;a href=&quot;https://github.com/cleder/gpc-init&quot;
        rel=&quot;noopener noreferrer&quot;&gt;&lt;code&gt;pc-init&lt;/code&gt;&lt;/a&gt;
        to generate a strict &lt;code&gt;.pre-commit-config.yaml&lt;/code&gt; tailored
        for modern Python projects. This ensured that formatting, linting, and type
        checking became part of the development workflow rather than an afterthought.&lt;/p&gt;\n\n&lt;h3&gt;\n
        \ \n  \n  What Didn't Work\n&lt;/h3&gt;\n\n&lt;p&gt;Claude struggled with
        this instruction:&lt;/p&gt;\n\n&lt;blockquote&gt;\n&lt;p&gt;All Python code
        MUST be fully type-annotated; untyped function signatures and untyped module-level
        values are not permitted.&lt;/p&gt;\n&lt;/blockquote&gt;\n\n&lt;p&gt;Instead
        of fixing missing annotations, it occasionally attempted to disable checks
        in &lt;code&gt;pyproject.toml&lt;/code&gt;.&lt;/p&gt;\n\n&lt;p&gt;Some manual
        intervention and code review were required to steer it back towards the desired
        standards.&lt;/p&gt;\n\n&lt;p&gt;The experience reinforced an observation
        I've made repeatedly with coding agents:&lt;/p&gt;\n\n&lt;blockquote&gt;\n&lt;p&gt;Agents
        optimize for making the error disappear, not necessarily for preserving your
        engineering constraints.&lt;/p&gt;\n&lt;/blockquote&gt;\n\n&lt;p&gt;If you
        care about those constraints, you still need strong feedback loops.&lt;/p&gt;\n\n&lt;h3&gt;\n
        \ \n  \n  Type Checker Observations\n&lt;/h3&gt;\n\n&lt;p&gt;Running all three
        type checkers together was still faster than a single &lt;code&gt;mypy&lt;/code&gt;
        run.&lt;/p&gt;\n\n&lt;p&gt;Interestingly, they complemented each other rather
        than duplicating effort:&lt;/p&gt;\n\n&lt;ul&gt;\n&lt;li&gt;\n&lt;code&gt;ty&lt;/code&gt;
        found some issues the others missed.&lt;/li&gt;\n&lt;li&gt;\n&lt;code&gt;pyrefly&lt;/code&gt;
        found different classes of problems.&lt;/li&gt;\n&lt;li&gt;\n&lt;code&gt;zuban&lt;/code&gt;
        felt the closest to &lt;code&gt;mypy&lt;/code&gt; and was by far the easiest
        to configure.&lt;/li&gt;\n&lt;/ul&gt;\n\n&lt;p&gt;The newer type-checking
        ecosystem is still catching up with &lt;code&gt;mypy&lt;/code&gt; in terms
        of documentation and examples, so reaching the level of strictness I wanted
        involved a fair amount of experimentation.&lt;/p&gt;\n\n&lt;h2&gt;\n  \n  \n
        \ Prize Categories\n&lt;/h2&gt;\n\n&lt;p&gt;Not submitting for any specific
        prize category.&lt;/p&gt;\n\n&lt;p&gt;The real prize was finding out how far
        AI-assisted, specification-driven development can be pushed before human review
        becomes the limiting factor. \U0001F609\uFE0F&lt;/p&gt;</description>\n\t<pubDate>Sun,
        12 Jul 2026 21:23:52 +0000</pubDate>\n</item>\n<item>\n\t<title>Mike C. Fletcher:
        PyOpenGL 4.0.0a1</title>\n\t<guid>http://blog.vrplumber.com/b/2026/07/12/pyopengl-400a1/</guid>\n\t<link>http://blog.vrplumber.com/b/2026/07/12/pyopengl-400a1/</link>\n\t<description>&lt;p&gt;I've
        been trying to make some time for Open Source projects again. I've been using
        LLMs for much of the coding because the vast bulk of it at this point is just
        grunt work. First up is PyOpenGL. The tests the LLM produced turned up a bunch
        of bugs in the core that have lain dormant for years because the endpoints
        weren't getting used. The LLM tests are not particularly fun or interesting,
        but they did a pretty good job of finding wrapping errors. They also exercised
        GLES and EGL enough to make it far more reasonable to actually use those two
        interfaces.&lt;/p&gt;\n\n&lt;p&gt;Shout out to glfw python library for working
        cleanly on the Wayland only environment. Definitely helped to find the hidden
        GLX dependencies we had throughout the Linux platform implementation. One
        of the biggest ones there was the GLUT library. The other thing that came
        out was the GLE library being legacy (compatibility) OpenGL.&lt;/p&gt;\n\n&lt;p&gt;PyOpenGL
        4.0.0a1 is classified as a major release mostly because of the abandonment
        of old Pythons (&amp;lt;3.9) and old Numpy (&amp;lt;2). Other than that there's
        mostly just bug-fixes that came from the new test suites.&lt;/p&gt;\n\n&lt;p&gt;GLU&lt;br
        /&gt;* gluUnProject4 missing arguments&lt;br /&gt;* gluNewQuadric/gluQuadricCallback
        fix the callback mechanism to work like Nurbs code&lt;br /&gt;* gluTessVertex/gluTessBeginPolygon
        and combine callback, original object return fixes&lt;br /&gt;* gluGetNurbsProperty
        added, allocates the output&lt;br /&gt;* gluNurbsCallbackData(EXT) argtype
        fix&lt;/p&gt;\n\n&lt;p&gt;glGet Sizes&lt;br /&gt;* sizing tables regenerated
        based on results from size probing, lots of incorrect sizes fixed; note that
        these fixes are constrained to extensions I happen to have access to on my
        platforms&lt;br /&gt;* fix the code generator's constant generation&lt;br
        /&gt;* glGetPolygonStipple fixed size output&lt;br /&gt;* glGetCompressedTexImage
        glGetTexImageCompressed was ignoring level and using an ARB constant&lt;/p&gt;\n\n&lt;p&gt;Wrappers&lt;br
        /&gt;* remove double wrapping on glGetHistogramParameter{f,i}vEXT, glGenVertexArrays,
        glDrawBuffersEXT (which was also mis-named glDrawBuffers)&lt;br /&gt;* glHistogram
        double wrapped as well, which was crashing vertex_array_object on import which
        was then causing higher level code to treat the extension as unsupported&lt;/p&gt;\n\n&lt;p&gt;64-bit
        Integer Arrays&lt;br /&gt;* GL_INT64 / GL_UNSIGNED_INT64 new array types for
        all of the array handlers&lt;/p&gt;\n\n&lt;p&gt;No-Numpy Operation&lt;br /&gt;*
        ctypesarrays zeros/ones handler&lt;br /&gt;* a few spots where GLchar arrays
        were needed as return types&lt;br /&gt;* gl(Get)ProgramNamedParameter*NV input
        size fix&lt;br /&gt;* glGetActiveAttribARB optional bufSize parameter added&lt;br
        /&gt;* ARB.vertex_shader allow passign in size parameter&lt;br /&gt;* allow
        passing a ctypes char_p as shader-text&lt;/p&gt;\n\n&lt;p&gt;GLES&lt;br /&gt;*
        images module for GLES&lt;br /&gt;* friendly wrappers mimicing the GL ones
        for lots of endpoints&lt;br /&gt;* glGetString/glGetStringi restype fix&lt;br
        /&gt;* Normalising of GLES extension names to the GL_* form (same as GL)&lt;/p&gt;\n\n&lt;p&gt;General
        Bug Fixes&lt;br /&gt;* Large constant wrapping fix&lt;br /&gt;* Caching of
        extension/version data per-context&lt;br /&gt;* Core/version extension handles
        cases where &quot;VERSION&quot; is not the *first* token&lt;br /&gt;* ShaderProgram.retrieve()
        fix for unpacking glGetProgramBinary&lt;br /&gt;* input-or-output converter
        for args that can be either&lt;br /&gt;* ArrayDatatype.get_ffi_argtype etc
        PyPy specific mechanisms for array interactions&lt;/p&gt;\n\n&lt;p&gt;Logging&lt;br
        /&gt;* make the log decorator more type-check friendly&lt;/p&gt;\n\n&lt;p&gt;Packaging&lt;br
        /&gt;* License declaration fixes for more modern packaging tools&lt;/p&gt;\n\n&lt;p&gt;There
        shouldn't be many significant regressions, as almost everything is a correctness
        fix, but there's a lot of new code, particularly for the GLES improvements.
        The alpha is up now for those who want to test the changes against their codebase,
        but this is an alpha release, so there may be more significant code changes
        as we move toward a 4.0.0 final release.&lt;/p&gt;\n\n&lt;p&gt;There's still
        some work to do on the OpenGLContext release, but the teaser image above should
        give you an idea where it's going. It's a direct render of the Khronos sample
        asset &lt;a href=&quot;https://github.com/KhronosGroup/glTF-Sample-Assets/blob/main/Models/ABeautifulGame/README.md&quot;&gt;A
        Beautiful Game&lt;/a&gt;&lt;/p&gt;</description>\n\t<pubDate>Sun, 12 Jul 2026
        20:55:51 +0000</pubDate>\n</item>\n\n</channel>\n</rss>\n"
