        Click here to learn more&lt;/a&gt; ]&lt;/em&gt;&lt;/p&gt;</description>\n\t<pubDate>Tue,
        14 Jul 2026 19:30:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Peter Bengtsson:
        How to use a list/tuple/array in Django with a raw SQL cursor</title>\n\t<guid>http://www.peterbe.com/plog/how-to-use-a-listtuplearray-in-django-with-a-raw-sql-cursor</guid>\n\t<link>http://www.peterbe.com/plog/how-to-use-a-listtuplearray-in-django-with-a-raw-sql-cursor</link>\n\t<description>&lt;p&gt;This
        does &lt;strong&gt;&lt;em&gt;not&lt;/em&gt;&lt;/strong&gt; work:&lt;/p&gt;\n&lt;pre&gt;&lt;code
        class=&quot;hljs&quot;&gt;\n&lt;span class=&quot;hljs-keyword&quot;&gt;from&lt;/span&gt;
        django.db &lt;span class=&quot;hljs-keyword&quot;&gt;import&lt;/span&gt; connection\n\nlist_of_values
        = [&lt;span class=&quot;hljs-number&quot;&gt;1&lt;/span&gt;, &lt;span class=&quot;hljs-number&quot;&gt;2&lt;/span&gt;,
        &lt;span class=&quot;hljs-number&quot;&gt;3&lt;/span&gt;]\n&lt;span class=&quot;hljs-keyword&quot;&gt;with&lt;/span&gt;
        connection.cursor() &lt;span class=&quot;hljs-keyword&quot;&gt;as&lt;/span&gt;
        cursor:\n    cursor.execute(&lt;span class=&quot;hljs-string&quot;&gt;&amp;quot;&amp;quot;&amp;quot;\n
        \       SELECT *\n        FROM my_model_table\n        WHERE some_value IN
        %s\n    &amp;quot;&amp;quot;&amp;quot;&lt;/span&gt;, [\n        &lt;span class=&quot;hljs-built_in&quot;&gt;tuple&lt;/span&gt;(list_of_values),\n
        \   ])\n    results = cursor.fetchall()\n&lt;/code&gt;&lt;/pre&gt;\n\n&lt;p&gt;It
        will give you:&lt;/p&gt;\n&lt;pre&gt;django.db.utils.ProgrammingError: syntax
        error at or near &amp;quot;&amp;#x27;(1,2,3)&amp;#x27;&amp;quot;\nLINE 4:
        \        WHERE id IN &amp;#x27;(1,2,3)&amp;#x27;&lt;/pre&gt;\n\n&lt;p&gt;It
        &lt;em&gt;used&lt;/em&gt; to work with &lt;code&gt;psycopg&lt;/code&gt; v2.
        Now, in psycopg v3, you have to use the &lt;code&gt;ANY&lt;/code&gt; operator.
        See &lt;a href=&quot;https://www.psycopg.org/psycopg3/docs/basic/from_pg2.html#you-cannot-use-in-s-with-a-tuple&quot;&gt;&quot;You
        cannot use IN %s with a tuple&quot;&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;This &lt;em&gt;will&lt;/em&gt;
        work:&lt;/p&gt;\n&lt;pre&gt;&lt;code class=&quot;hljs&quot;&gt;\n&lt;span
        class=&quot;hljs-keyword&quot;&gt;from&lt;/span&gt; django.db &lt;span class=&quot;hljs-keyword&quot;&gt;import&lt;/span&gt;
        connection\n\nlist_of_values = [&lt;span class=&quot;hljs-number&quot;&gt;1&lt;/span&gt;,
        &lt;span class=&quot;hljs-number&quot;&gt;2&lt;/span&gt;, &lt;span class=&quot;hljs-number&quot;&gt;3&lt;/span&gt;]\n&lt;span
        class=&quot;hljs-keyword&quot;&gt;with&lt;/span&gt; connection.cursor() &lt;span
        class=&quot;hljs-keyword&quot;&gt;as&lt;/span&gt; cursor:\n    cursor.execute(\n
        \       &lt;span class=&quot;hljs-string&quot;&gt;&amp;quot;&amp;quot;&amp;quot;\n
        \       SELECT *\n        FROM my_model_table\n        WHERE some_value =
        ANY(%s)\n    &amp;quot;&amp;quot;&amp;quot;&lt;/span&gt;,\n        [\n            list_of_values,\n
        \       ],\n    )\n    results = cursor.fetchall()\n&lt;/code&gt;&lt;/pre&gt;\n\n&lt;p&gt;Note
        the &lt;code&gt;ANY(%s)&lt;/code&gt;, and instead of a list that has a tuple,
        it's a list that has a list.&lt;/p&gt;\n&lt;h4 id=&quot;what-about-a-list-of-strings&quot;&gt;&lt;a
        class=&quot;toclink&quot; href=&quot;https://www.peterbe.com/oc-Python/rss.xml#what-about-a-list-of-strings&quot;&gt;What
        About a List of Strings&lt;/a&gt;&lt;/h4&gt;\n&lt;p&gt;Consider...&lt;/p&gt;\n&lt;pre&gt;&lt;code
        class=&quot;hljs&quot;&gt;\nfrom django.db import connection\n\n&lt;span class=&quot;hljs-deletion&quot;&gt;-list_of_values
        = [1, 2, 3]&lt;/span&gt;\n&lt;span class=&quot;hljs-addition&quot;&gt;+list_of_values
        = [&amp;#x27;foo&amp;#x27;, &amp;#x27;bar&amp;#x27;, &amp;#x27;fiz&amp;#x27;]&lt;/span&gt;\nwith
        connection.cursor() as cursor:\n    cursor.execute(\n        &amp;quot;&amp;quot;&amp;quot;\n
        \       SELECT *\n        FROM my_model_table\n        WHERE some_value =
        ANY(%s)\n    &amp;quot;&amp;quot;&amp;quot;,\n        [\n            list_of_values,\n
        \       ],\n    )\n    results = cursor.fetchall()\n&lt;/code&gt;&lt;/pre&gt;\n\n&lt;p&gt;That
        will result in:&lt;/p&gt;\n&lt;pre&gt;django.db.utils.DataError: invalid input
        syntax for type integer: &amp;quot;foo&amp;quot;\nLINE 4:         WHERE some_value
        = ANY(&amp;#x27;{foo,bar,fiz}&amp;#x27;)&lt;/pre&gt;\n\n&lt;p&gt;My solution
        was to rewrite the SQL string itself and treat each value as a parameter each.
        In other words, the SQL string, before being sent to &lt;code&gt;cursor.execute(...)&lt;/code&gt;
        will contain something like this:&lt;/p&gt;\n&lt;pre&gt;&lt;code class=&quot;hljs&quot;&gt;\n&lt;span
        class=&quot;hljs-keyword&quot;&gt;AND&lt;/span&gt; (\n  some_value &lt;span
        class=&quot;hljs-operator&quot;&gt;=&lt;/span&gt; &lt;span class=&quot;hljs-operator&quot;&gt;%&lt;/span&gt;
        &lt;span class=&quot;hljs-keyword&quot;&gt;OR&lt;/span&gt;\n  some_value &lt;span
        class=&quot;hljs-operator&quot;&gt;=&lt;/span&gt; &lt;span class=&quot;hljs-operator&quot;&gt;%&lt;/span&gt;
        &lt;span class=&quot;hljs-keyword&quot;&gt;OR&lt;/span&gt;\n  some_value &lt;span
        class=&quot;hljs-operator&quot;&gt;=&lt;/span&gt; &lt;span class=&quot;hljs-operator&quot;&gt;%&lt;/span&gt;
        &lt;span class=&quot;hljs-keyword&quot;&gt;OR&lt;/span&gt;\n  some_value &lt;span
        class=&quot;hljs-operator&quot;&gt;=&lt;/span&gt; &lt;span class=&quot;hljs-operator&quot;&gt;%&lt;/span&gt;
        &lt;span class=&quot;hljs-keyword&quot;&gt;OR&lt;/span&gt;\n  &lt;span class=&quot;hljs-comment&quot;&gt;--
        ...etc...&lt;/span&gt;\n  some_value &lt;span class=&quot;hljs-operator&quot;&gt;=&lt;/span&gt;
        &lt;span class=&quot;hljs-operator&quot;&gt;%&lt;/span&gt;\n)\n&lt;/code&gt;&lt;/pre&gt;\n\n&lt;p&gt;This
        will work and is safe:&lt;/p&gt;\n&lt;pre&gt;&lt;code class=&quot;hljs&quot;&gt;\n&lt;span
        class=&quot;hljs-keyword&quot;&gt;from&lt;/span&gt; django.db &lt;span class=&quot;hljs-keyword&quot;&gt;import&lt;/span&gt;
        connection\n\nlist_of_values = [&lt;span class=&quot;hljs-string&quot;&gt;&amp;quot;foo&amp;quot;&lt;/span&gt;,
        &lt;span class=&quot;hljs-string&quot;&gt;&amp;quot;bar&amp;quot;&lt;/span&gt;,
        &lt;span class=&quot;hljs-string&quot;&gt;&amp;quot;fiz&amp;quot;&lt;/span&gt;]\n&lt;span
        class=&quot;hljs-keyword&quot;&gt;with&lt;/span&gt; connection.cursor() &lt;span
        class=&quot;hljs-keyword&quot;&gt;as&lt;/span&gt; cursor:\n    cursor.execute(\n
        \       &lt;span class=&quot;hljs-string&quot;&gt;f&amp;quot;&amp;quot;&amp;quot;\n
        \       SELECT *\n        FROM my_model_table\n        WHERE (&lt;span class=&quot;hljs-subst&quot;&gt;{&lt;span
        class=&quot;hljs-string&quot;&gt;&amp;quot; OR &amp;quot;&lt;/span&gt;.join([&lt;span
        class=&quot;hljs-string&quot;&gt;&amp;quot;some_value = %s&amp;quot;&lt;/span&gt;
        &lt;span class=&quot;hljs-keyword&quot;&gt;for&lt;/span&gt; _ &lt;span class=&quot;hljs-keyword&quot;&gt;in&lt;/span&gt;
        list_of_values])}&lt;/span&gt;)\n    &amp;quot;&amp;quot;&amp;quot;&lt;/span&gt;,\n
        \       list_of_values,\n    )\n    results = cursor.fetchall()\n&lt;/code&gt;&lt;/pre&gt;</description>\n\t<pubDate>Tue,
        14 Jul 2026 13:14:40 +0000</pubDate>\n</item>\n<item>\n\t<title>Mike Driscoll:
        Python 101 3rd Edition Kickstarter Launch</title>\n\t<guid>https://blog.pythonlibrary.org/2026/07/14/python-101-3rd-edition-kickstarter-launch/</guid>\n\t<link>https://blog.pythonlibrary.org/2026/07/14/python-101-3rd-edition-kickstarter-launch/</link>\n\t<description>&lt;h4&gt;Learn
        Python with a Book Designed for Beginners&lt;/h4&gt;\n&lt;p&gt;Hello! I&amp;#8217;m
        Michael Driscoll, and I&amp;#8217;m excited to announce the third edition
        of &lt;a href=&quot;https://www.kickstarter.com/projects/driscollis/python-101-3rd-edition&quot;&gt;&lt;strong&gt;Python
        101&lt;/strong&gt;&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;img class=&quot;aligncenter
        size-full wp-image-12815&quot; src=&quot;https://blog.pythonlibrary.org/wp-content/uploads/2026/07/py101_kick_3rd.png&quot;
        alt=&quot;&quot; width=&quot;715&quot; height=&quot;398&quot; /&gt;&lt;/p&gt;\n&lt;p&gt;For
        years, &lt;i&gt;Python 101&lt;/i&gt; has helped readers take their first steps
        into programming. Whether you&amp;#8217;re a complete beginner, a student,
        or someone looking to learn Python for work or personal projects, the goal
        has always been the same: make learning Python approachable, practical, and
        enjoyable.&lt;/p&gt;\n&lt;p&gt;Python has continued to evolve, and it&amp;#8217;s
        time for the book to evolve with it. This &lt;a href=&quot;https://www.kickstarter.com/projects/driscollis/python-101-3rd-edition&quot;&gt;Kickstarter&lt;/a&gt;
        will help fund the writing, editing, production, and publication of the fully
        updated third edition.&lt;/p&gt;\n&lt;h3&gt;Why a Third Edition?&lt;/h3&gt;\n&lt;p&gt;Python
        has changed significantly since the previous edition. New language features,
        updated best practices, and improvements throughout the ecosystem make this
        the right time for a comprehensive update.&lt;/p&gt;\n&lt;p&gt;The third edition
        will include:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Updated examples compatible
        with modern versions of Python&lt;/li&gt;\n&lt;li&gt;New coverage of current
        Python features and best practices&lt;/li&gt;\n&lt;li&gt;Improved code samples
        and exercises (when applicable)&lt;/li&gt;\n&lt;li&gt;Corrections and refinements
        based on reader feedback&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;The goal isn&amp;#8217;t
        simply to revise the previous edition\u2014it&amp;#8217;s to create the best
        beginner-focused version of &lt;i&gt;Python 101&lt;/i&gt; yet.&lt;/p&gt;\n&lt;h3&gt;Who
        Is This Book For?&lt;/h3&gt;\n&lt;p&gt;This book is designed for:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Complete
        beginners with no programming experience&lt;/li&gt;\n&lt;li&gt;Students learning
        Python&lt;/li&gt;\n&lt;li&gt;Self-taught developers&lt;/li&gt;\n&lt;li&gt;Professionals
        transitioning into software development&lt;/li&gt;\n&lt;li&gt;Anyone looking
        for a clear, practical introduction to Python&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;No
        prior programming knowledge is required.&lt;/p&gt;\n&lt;h3&gt;Why Kickstarter?&lt;/h3&gt;\n&lt;p&gt;Kickstarter
        allows readers to directly support the creation of the book while helping
        ensure it receives the time and attention needed for a high-quality release.&lt;/p&gt;\n&lt;p&gt;Funding
        will help cover:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Writing&lt;/li&gt;\n&lt;li&gt;Ebook
        production&lt;/li&gt;\n&lt;li&gt;Print preparation&lt;/li&gt;\n&lt;li&gt;Kickstarter
        fulfillment and shipping materials&lt;/li&gt;\n&lt;li&gt;Any cover refinements&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Most
        importantly, it allows me to focus on creating the strongest edition possible.&lt;/p&gt;\n&lt;h3&gt;Rewards&lt;/h3&gt;\n&lt;p&gt;Depending
        on your pledge level, rewards may include:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;DRM-free
        PDF edition&lt;/li&gt;\n&lt;li&gt;EPUB and Kindle editions&lt;/li&gt;\n&lt;li&gt;Printed
        paperback&lt;/li&gt;\n&lt;li&gt;Signed copies&lt;/li&gt;\n&lt;li&gt;Early
        access to chapters during development&lt;/li&gt;\n&lt;li&gt;Exclusive Kickstarter
        updates&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;Project updates will be shared throughout
        the process so backers can follow the book&amp;#8217;s progress.&lt;/p&gt;\n&lt;h3&gt;Thank
        You&lt;/h3&gt;\n&lt;p&gt;Whether you back this project or simply share it
        with others, your support means a great deal.&lt;/p&gt;\n&lt;p&gt;Writing
        technical books is a collaborative effort between authors and readers. Your
        encouragement has helped make previous editions successful, and I&amp;#8217;m
        excited to bring an updated &lt;i&gt;Python 101&lt;/i&gt; to the next generation
        of Python learners.&lt;/p&gt;\n&lt;p&gt;Thank you for helping make the third
        edition possible.&lt;/p&gt;\n&lt;h2&gt;&lt;a href=&quot;https://www.kickstarter.com/projects/driscollis/python-101-3rd-edition&quot;&gt;Back
        the project&lt;/a&gt;&lt;/h2&gt;\n&lt;p&gt;The post &lt;a href=&quot;https://blog.pythonlibrary.org/2026/07/14/python-101-3rd-edition-kickstarter-launch/&quot;&gt;Python
        101 3rd Edition Kickstarter Launch&lt;/a&gt; appeared first on &lt;a href=&quot;https://blog.pythonlibrary.org&quot;&gt;Mouse
        Vs Python&lt;/a&gt;.&lt;/p&gt;</description>\n\t<pubDate>Tue, 14 Jul 2026
        13:05:15 +0000</pubDate>\n</item>\n<item>\n\t<title>PyPodcats: Trailer: Episode
        12 With Juanita Gomez</title>\n\t<guid>https://pypodcats.live/episodes/ep-12-trailer/</guid>\n\t<link>https://pypodcats.live/episodes/ep-12-trailer/</link>\n\t<description>A
        preview of our chat with Juanita Gomez. Watch the full episode on July 17,
        2026A preview of our chat with Juanita Gomez. Watch the full episode on July
        17, 2026&lt;p&gt;Sneak Peek of our chat with Juanita Gomez, hosted by Cheuk
        Ting Ho and Mariatta Wijaya.&lt;/p&gt;\n&lt;p&gt;Juanita is a Ph.D. candidate
        in Computer Science at UC Santa Cruz, where her research focuses on improving
        the\nsecurity of scientific open source software. She is a former developer
        of the Spyder IDE, one of the community\nmanagers for the Scientific Python
        project, and part of the organizing committee for the SciPy conference.&lt;/p&gt;\n&lt;p&gt;In
        this episode, Juanita shares how she went from making music videos on YouTube
        to creating friendlier documentation\nfor Spyder, her research on open source
        security, practical security tips for maintainers, and her journey navigating\nimposter
        syndrome as a woman and Latina in tech. Plus: The X Factor, Shakira, and singing
        on stage at SciPy.&lt;/p&gt;\n&lt;p&gt;Full episode is coming on &lt;strong&gt;July
        17th, 2026&lt;/strong&gt;! Subscribe to our podcast now!&lt;/p&gt;</description>\n\t<pubDate>Tue,
        14 Jul 2026 13:00:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Python Bytes:
        #488 tau - it's 2pi and it writes code</title>\n\t<guid>https://pythonbytes.fm/episodes/show/488/tau-its-2pi-and-it-writes-code</guid>\n\t<link>https://pythonbytes.fm/episodes/show/488/tau-its-2pi-and-it-writes-code</link>\n\t<description>&amp;lt;strong&amp;gt;Topics
        covered in this episode:&amp;lt;/strong&amp;gt;&amp;lt;br&amp;gt;\n\n&amp;lt;ul&amp;gt;\n\t&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;The
        trusted-publishing debate: how to do it right vs. why you shouldn't trust
