  response:
    body:
      string: "<?xml version=\"1.0\"?>\n<rss version=\"2.0\" xmlns:dc=\"http://purl.org/dc/elements/1.1/\">\n\n<channel>\n\t<title>Planet
        Python</title>\n\t<link>http://planetpython.org/</link>\n\t<language>en</language>\n\t<description>Planet
        Python - http://planetpython.org/</description>\n\n<item>\n\t<title>Wingware:
        Wing Python IDE Version 12 - July 20, 2026</title>\n\t<guid>https://wingware.com/news/2026-07-20</guid>\n\t<link>https://wingware.com/news/2026-07-20</link>\n\t<description>&lt;p&gt;Wing
        Python IDE version 12 has been released. Wing 12 integrates the Claude\nCode
        AI coding agent directly into the IDE, with a new &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;Claude&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;Code&lt;/span&gt;&lt;/tt&gt;
        tool,\na &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Tasks&lt;/span&gt;&lt;/tt&gt;
        tool for planning and reviewing AI agent work, and a set of MCP\nservers that
        give the agent access to Wing's source code analysis, unit\ntesting, debugger,
        and code review features. Wing 12 makes it faster and\ncheaper to direct AI
        agents; see our &lt;a class=&quot;reference&quot; href=&quot;http://wingware.com/psupport/wing12/benchmarks/bench-intro.html&quot;&gt;benchmarks&lt;/a&gt;
        for details.&lt;/p&gt;\n&lt;p&gt;Wing 12 also adds configurable AI-driven
        &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Code&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Actions&lt;/span&gt;&lt;/tt&gt;, code &lt;tt
        class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;FIX&lt;/span&gt;&lt;/tt&gt;\nactions,
        automated &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Write&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Tests&lt;/span&gt;&lt;/tt&gt;, pseudo-terminal
        support for OS Commands\nand Debug I/O, support for tools and OS Commands
        in editor splits, a\nreorganized Tools menu, automatic test discovery, Preferences
        search, and\nmore.&lt;/p&gt;\n&lt;img src=&quot;https://wingware.com/images/screenshots/wing12-screenshot.png&quot;
        alt=&quot;Wing 12 Screen Shot&quot; class=&quot;eye-candy-image unfloat-at-900&quot;
        width=&quot;650px&quot; /&gt;&lt;h3&gt;Downloads&lt;/h3&gt;&lt;div class=&quot;note&quot;&gt;\nBe
        sure to &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Check&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;for&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;Updates&lt;/span&gt;&lt;/tt&gt;
        in Wing's &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Help&lt;/span&gt;&lt;/tt&gt;
        menu after installing, to make\nsure that you have the latest hot fixes.&lt;/div&gt;\n&lt;p&gt;&lt;a
        class=&quot;reference&quot; href=&quot;http://wingware.com/downloads&quot;&gt;Wing
        12&lt;/a&gt; -- the full Python IDE, available as Wing Pro (for\nagentic development)
        or Wing Classic (for manual development) depending on\nyour license, with
        a free 30-day trial of Wing Pro.&lt;/p&gt;\n&lt;p&gt;&lt;a class=&quot;reference&quot;
        href=&quot;http://wingware.com/downloads/wing-101&quot;&gt;Wing 101 v. 12&lt;/a&gt;
        -- a simplified free Python IDE for\nteaching beginning programmers.&lt;/p&gt;\n&lt;p&gt;Wing
        11 and earlier versions are not affected by installation of Wing 12 and may
        be\ninstalled and used independently.  However, project files for Wing 11
        and earlier are\nconverted when opened by Wing 12 and should be saved under
        a new name, since Wing 12\nprojects cannot be opened by older versions of
        Wing.&lt;/p&gt;\n&lt;h2&gt;New in Wing 12&lt;/h2&gt;&lt;h3&gt;AI Coding Agent
        Integration with Claude Code&lt;/h3&gt;&lt;p&gt;Wing 12 adds a &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;Claude&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;Code&lt;/span&gt;&lt;/tt&gt;
        tool that integrates the Claude Code AI coding agent\nwith the IDE.  &lt;tt
        class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Set&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Up&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;for&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Claude&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;Code&lt;/span&gt;&lt;/tt&gt;
        in the &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Project&lt;/span&gt;&lt;/tt&gt;
        menu configures\nthe active project for AI agent development.&lt;/p&gt;\n&lt;p&gt;A
        set of MCP (Model Context Protocol) servers gives Claude Code access to Wing's
        source\ncode analysis, testing, and debugger functionality, so the agent can
        more efficiently\nnavigate and understand your code, write, run, and fix unit
        tests, and use the\ndebugger to diagnose difficult runtime errors.  In our
        &lt;a class=&quot;reference&quot; href=&quot;http://wingware.com/psupport/wing12/benchmarks/bench-intro.html&quot;&gt;benchmarks&lt;/a&gt;,
        giving Claude Code access to Wing's\nMCP servers made agent-driven coding
        tasks both faster and cheaper.&lt;/p&gt;\n&lt;h3&gt;Tasks Tool&lt;/h3&gt;&lt;p&gt;The
        new &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Tasks&lt;/span&gt;&lt;/tt&gt;
        tool lets you plan, queue, execute, review, and audit the\nhistory of AI agent
        development tasks, making it easier to supervise and inspect\nthe agent's
        work before committing it to revision control.&lt;/p&gt;\n&lt;h3&gt;FIX Features
        and Write Tests&lt;/h3&gt;&lt;p&gt;Wing 12 adds AI agent driven &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;FIX&lt;/span&gt;&lt;/tt&gt; features that hand the
        current debugger\nbug, failing unit tests, or code warnings to Claude Code
        for resolution. New\n&lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Write&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Tests&lt;/span&gt;&lt;/tt&gt; items in the
        &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Testing&lt;/span&gt;&lt;/tt&gt;
        and editor context menus prompt the\nagent to write unit tests for selected
        code.&lt;/p&gt;\n&lt;h3&gt;Code Actions&lt;/h3&gt;&lt;p&gt;Wing 12 also adds
        AI &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Code&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Actions&lt;/span&gt;&lt;/tt&gt;, accessed
        from the &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;FIX&lt;/span&gt;&lt;/tt&gt;
        icon in the\neditor toolbar, that operate on selected code or the enclosing
        scope.\nBuilt-in actions include explaining code, reviewing it for quality
        or\nsecurity risks, fixing code warnings, optimizing for performance, and\nupdating
        comments and docstrings. The action list is user-extensible, so you\ncan add
        your own prompts for tasks you run often.&lt;/p&gt;\n&lt;h3&gt;Pseudo-Terminal
        for OS Commands and Debug I/O&lt;/h3&gt;&lt;p&gt;The &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;OS&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;Commands&lt;/span&gt;&lt;/tt&gt;
        and &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Debug&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;I/O&lt;/span&gt;&lt;/tt&gt; tools now default
        to using a pseudo-terminal\nthat implements full ANSI terminal emulation,
        so you can run and debug programs that\nuse color output, cursor positioning,
        or full-screen TUIs.&lt;/p&gt;\n&lt;h3&gt;Redesigned OS Commands Capability&lt;/h3&gt;&lt;p&gt;The
        &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;OS&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Commands&lt;/span&gt;&lt;/tt&gt; tool has
        been replaced with configurable OS Commands in\nthe &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;Tools&lt;/span&gt;&lt;/tt&gt; menu. Each OS Command
        acts like its own tool, for use in any\ntool or editor split.&lt;/p&gt;\n&lt;h3&gt;Tools
        in Editor Splits and Reorganized Tools Menu&lt;/h3&gt;&lt;p&gt;Tools can now
        also be added or dragged to editor splits, allowing for much\nmore flexible
        workspace layout. The &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Tools&lt;/span&gt;&lt;/tt&gt;
        menu has been reorganized into\nrelated groups, with less-user and legacy
        tools in an &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Other&lt;/span&gt;&lt;/tt&gt;
        sub-menu, so\nmore commonly used tools area easier to find.&lt;/p&gt;\n&lt;h3&gt;Test
        Discovery and Preferences Search&lt;/h3&gt;&lt;p&gt;Wing 12 adds automatic
        test file discovery and discovery of individual unit tests\nwithin files,
        so you usually don't need to specify test file patterns or add test\nfiles
        individually.  The &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Preferences&lt;/span&gt;&lt;/tt&gt;
        dialog now supports text search and\nback/forward navigation.&lt;/p&gt;\n&lt;h3&gt;Other
        Minor Features and Improvements&lt;/h3&gt;&lt;p&gt;Wing 12 also significantly
        speeds up source code analysis, prompts for SSH\npassphrases and HTTPS credentials
        when needed during VCS operations, detects\nexternally modified files much
        more quickly and with reduced CPU load, saves and\nrestores tool console scrollback
        across project close/reopen, supports clickable\nOSC 8 hyperlinks in OS Commands
        and Debug I/O tools, adds a preference to select\nthe &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;ssh&lt;/span&gt;&lt;/tt&gt; or &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;plink.exe&lt;/span&gt;&lt;/tt&gt; SSH implementation,
        shows a notice on the next startup\nwhen Wing's previous session ended in
        an unexpected crash, and makes a number of\nother bug fixes and usability
        improvements.&lt;/p&gt;\n&lt;h3&gt;Product Line Changes&lt;/h3&gt;&lt;p&gt;Wing
        12 simplifies the product line.  The Commercial / Non-Commercial use distinction\nhas
        been replaced by two feature-based product tiers:&lt;/p&gt;\n&lt;div class=&quot;bullet-list&quot;&gt;&lt;ul&gt;&lt;li&gt;&lt;span
        class=&quot;bullet&quot;&gt;&lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Wing&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Pro&lt;/span&gt;&lt;/tt&gt; -- the full-featured
        Python IDE including AI agent development tools&lt;/span&gt;&lt;/li&gt;\n&lt;li&gt;&lt;span
        class=&quot;bullet&quot;&gt;&lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Wing&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Classic&lt;/span&gt;&lt;/tt&gt; -- the complete
        traditional Python IDE for hands-on development,\nwith no AI agent features&lt;/span&gt;&lt;/li&gt;\n&lt;/ul&gt;&lt;/div&gt;&lt;p&gt;Anyone
        may purchase either tier for any purpose. Existing Commercial and\nNon-Commercial
        Use licenses both become &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Wing&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Pro&lt;/span&gt;&lt;/tt&gt;. Customers who
        don't\nneed the AI agent features may move to &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;Wing&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;Classic&lt;/span&gt;&lt;/tt&gt;
        at renewal time, or\nany time sooner by contacting &lt;a class=&quot;reference&quot;
        href=&quot;mailto:support@wingware.com&quot;&gt;support&amp;#64;wingware.com&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;&lt;tt
        class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Wing&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Personal&lt;/span&gt;&lt;/tt&gt; has been
        discontinued.  Existing Wing Personal users may continue\nto use Personal
        11.x indefinitely, switch to free Wing 101, or purchase a Wing Classic\nlicense.
        \ See &lt;a class=&quot;reference&quot; href=&quot;http://wingware.com/store&quot;&gt;Pricing&lt;/a&gt;
        for details.&lt;/p&gt;\n&lt;h3&gt;Changes and Incompatibilities&lt;/h3&gt;&lt;p&gt;The
        single-LLM-query AI features originally introduced in Wing 11 (the &lt;tt
        class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;AI&lt;/span&gt;\n&lt;span
        class=&quot;pre&quot;&gt;Coder&lt;/span&gt;&lt;/tt&gt; and &lt;tt class=&quot;literal&quot;&gt;&lt;span
        class=&quot;pre&quot;&gt;AI&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;Chat&lt;/span&gt;&lt;/tt&gt;
        tools) are considered legacy in Wing 12 and hidden\nfrom the user interface
        by default. They remain available in projects that\nalready use them and can
        be re-enabled with &lt;tt class=&quot;literal&quot;&gt;&lt;span class=&quot;pre&quot;&gt;Project&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;Properties&lt;/span&gt; &lt;span class=&quot;pre&quot;&gt;&amp;gt;&lt;/span&gt;
        &lt;span class=&quot;pre&quot;&gt;AI&lt;/span&gt;&lt;/tt&gt; in\nProject Properties
        or in the .``Projects &amp;gt; AI`` preferences.&lt;/p&gt;\n&lt;p&gt;See &lt;a
        class=&quot;reference&quot; href=&quot;http://wingware.com/wingide/agent&quot;&gt;Wing's
        Claude Code Agent Integration&lt;/a&gt; for Wing 12's\nAI agent approach.&lt;/p&gt;\n&lt;p&gt;If
        you have questions, please don't hesitate to contact us at\n&lt;a class=&quot;reference&quot;
        href=&quot;mailto:support@wingware.com&quot;&gt;support&amp;#64;wingware.com&lt;/a&gt;.&lt;/p&gt;</description>\n\t<pubDate>Mon,
        20 Jul 2026 01:00:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Peter Bengtsson:
        Best Django Redis configuration for speed and size</title>\n\t<guid>http://www.peterbe.com/plog/best-django-redis-configuration-for-speed-and-size</guid>\n\t<link>http://www.peterbe.com/plog/best-django-redis-configuration-for-speed-and-size</link>\n\t<description>`lzma`
        compresses the most and `zlib` is about as fast as `zstd` in `django_redis`
        as compressor.</description>\n\t<pubDate>Sun, 19 Jul 2026 20:01:27 +0000</pubDate>\n</item>\n<item>\n\t<title>PyPy:
        Moving linux builds to GLIBC==2.28</title>\n\t<guid>https://www.pypy.org/posts/2026/07/moving-linux-builds-to-glibc228.html</guid>\n\t<link>https://www.pypy.org/posts/2026/07/moving-linux-builds-to-glibc228.html</link>\n\t<description>&lt;p&gt;A
        short note for visibility.&lt;/p&gt;\n&lt;p&gt;PyPy builds tarballs of the
        python interpreter &lt;a href=&quot;https://downloads.python.org/pypy/&quot;&gt;ready
        for\ndownload&lt;/a&gt;. These include the latest\nreleases and also nightly
        builds, fresh from our fleet of buildbots. Over the\nnext couple of days,
        the nightly builds on linux will transition from\n&lt;code&gt;manylinux2014&lt;/code&gt;
        based docker images &lt;a href=&quot;https://github.com/pypy/pypy-ci&quot;&gt;to
        &lt;code&gt;manylinux2_28&lt;/code&gt;\nimages&lt;/a&gt;. The practical implication
        is that\nnightly images, and the next releases, will require a minimum of
        &lt;code&gt;GLIBC&amp;gt;=2.28&lt;/code&gt;,\ni.e. AlmaLinux8, amanzonlinux
        2023, debian 10, ubuntu 20.04. For a good\noverview of how this glibc/distro/manylinux
        all works, see &lt;a href=&quot;https://github.com/mayeut/pep600_compliance&quot;&gt;the
        PEP 600 compliance\npage&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;The next release will
        indicate this change by a new PyPy major version, 8.0.0.\nIt should include
        a Python3.12 interpreter, in which case it will be the last\nrelease of the
        Python 3.11 interpreter.&lt;/p&gt;</description>\n\t<pubDate>Sat, 18 Jul 2026
        18:09:11 +0000</pubDate>\n</item>\n<item>\n\t<title>Core Dispatch: Core Dispatch
        #8</title>\n\t<guid>https://coredispatch.xyz/editions/8</guid>\n\t<link>https://coredispatch.xyz/editions/8</link>\n\t<description>&lt;p&gt;Welcome
        back to Core Dispatch! This edition covers July 5 through July 18, 2026.\nPython
        3.15.0 beta 4 landed today, July 18 (we just released\nit at the EuroPython
        sprints!), with 3.13.15, 3.14.7 and the first 3.15\nrelease candidate following
        on August 4.&lt;/p&gt;\n&lt;p&gt;It&amp;#x27;s EuroPython week! Much of the
        core team has been gathered in one place for our annual\nLanguage Summit (blog
        posts to come!) and the conference. Recordings aren&amp;#x27;t up just yet,\nbut
        as promised with the PyCon US talks, once they are, we&amp;#x27;ll pull talks
        and Language Summit\ncoverage from the team into a future edition.&lt;/p&gt;\n&lt;p&gt;On
        the PEP front, discussion is lively: &lt;a href=&quot;https://peps.python.org/pep-0835/&quot;&gt;PEP
        835&lt;/a&gt;\n(shorthand syntax for &lt;code&gt;Annotated&lt;/code&gt; metadata)
        and &lt;a href=&quot;https://peps.python.org/pep-0836/&quot;&gt;PEP 836&lt;/a&gt;\n(&amp;quot;JIT
        Go Brrr&amp;quot;) are both drawing dozens of new replies, and a few fresh
        PEPs \u2014 including\n&lt;a href=&quot;https://peps.python.org/pep-0840/&quot;&gt;PEP
        840&lt;/a&gt; on name resolution in class namespaces \u2014\nhave joined the
        queue.&lt;/p&gt;\n&lt;p&gt;Don&amp;#x27;t miss the &amp;quot;One More Thing&amp;quot;
        at the bottom of this edition. This one&amp;#x27;s a little sillier\n(correction:
        more unhinged) than usual, but we think you&amp;#x27;ll enjoy it.&lt;/p&gt;\n&lt;p&gt;As
        always, if you maintain a package or just like living on the edge, give the
        final\n3.15 beta a spin and &lt;a href=&quot;https://github.com/python/cpython/issues&quot;&gt;file
        any issues&lt;/a&gt;\nyou find.&lt;/p&gt;\n&lt;h3&gt;Upcoming Releases&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://peps.python.org/pep-0790/&quot;&gt;Python 3.15.0 beta 4&lt;/a&gt;
        \u2014 Jul 18&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://peps.python.org/pep-0719/&quot;&gt;Python
        3.13.15&lt;/a&gt; \u2014 Aug 04&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://peps.python.org/pep-0745/&quot;&gt;Python
        3.14.7&lt;/a&gt; \u2014 Aug 04&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;PEP Updates&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://peps.python.org/pep-0797/&quot;&gt;PEP 797: Shared Object
        Proxies&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://peps.python.org/pep-0838/&quot;&gt;PEP
        838: Adding &lt;code&gt;python-version&lt;/code&gt; to &lt;code&gt;pyvenv.cfg&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://peps.python.org/pep-0840/&quot;&gt;PEP 840: Name Resolution
        in Class Namespaces&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Steering
        Council Updates&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=&quot;https://discuss.python.org/t/2026-06-11-python-steering-council-meeting-summary/108096&quot;&gt;2026-06-11
        Python Steering Council meeting summary&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Merged
        PRs&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=&quot;https://github.com/python/cpython/pull/24180&quot;&gt;Add
        &lt;code&gt;next_network()&lt;/code&gt; to the &lt;code&gt;ipaddress&lt;/code&gt;
        module&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://github.com/python/cpython/pull/151671&quot;&gt;Normalize
        symlink targets in &lt;code&gt;tarfile.TarFile.gettarinfo()&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://github.com/python/cpython/pull/153260&quot;&gt;Add &lt;code&gt;tkinter.systray&lt;/code&gt;
        \u2014 system tray icon and notifications&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://github.com/python/cpython/pull/153255&quot;&gt;Add &lt;code&gt;tkinter.fontchooser&lt;/code&gt;
        \u2014 a font selection dialog&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://github.com/python/cpython/pull/150480&quot;&gt;Reject
        CR and LF in &lt;code&gt;email.utils.formataddr()&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://github.com/python/cpython/pull/153781&quot;&gt;Add a dataclass-like
        decorator for &lt;code&gt;ctypes&lt;/code&gt; structures&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://github.com/python/cpython/pull/152483&quot;&gt;Stop exposing
        the internal mapping when comparing &lt;code&gt;MappingProxyType&lt;/code&gt;
        objects&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://github.com/python/cpython/pull/153057&quot;&gt;Fix
        a data race compiling &lt;code&gt;string.Template&lt;/code&gt; patterns in
        free-threaded builds&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://github.com/python/cpython/pull/152646&quot;&gt;Make
        &lt;code&gt;tempfile.TemporaryFileWrapper&lt;/code&gt; public&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;Discussion&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://discuss.python.org/t/pep-835-shorthand-syntax-for-annotated-type-metadata/107814&quot;&gt;PEP
        835: Shorthand Syntax for &lt;code&gt;Annotated&lt;/code&gt; Type Metadata&lt;/a&gt;
