        17 Jul 2026 13:00:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Tryton News:
        Release 1.0.0 of Relatorio</title>\n\t<guid>https://discuss.tryton.org/t/release-1-0-0-of-relatorio/9293</guid>\n\t<link>https://discuss.tryton.org/t/release-1-0-0-of-relatorio/9293</link>\n\t<description>&lt;p&gt;We
        are proud to announce the release of &lt;a href=&quot;https://pypi.org/project/relatorio/&quot;&gt;Relatorio&lt;/a&gt;
        version 1.0.0.&lt;/p&gt;\n&lt;p&gt;Relatorio is a templating library for &lt;a
        href=&quot;http://opendocument.xml.org/&quot;&gt;OpenDocument &lt;/a&gt; using
        also OpenDocument as source format.&lt;/p&gt;\n&lt;p&gt;In addition to bug-fixes,
        this release contains the following improvements:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Replace
        python-magic dependency by puremagic&lt;/li&gt;\n&lt;li&gt;Remove support
        for chart template&lt;/li&gt;\n&lt;li&gt;Remove support for PDF&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;The
        package is available at &lt;a href=&quot;https://pypi.org/project/relatorio/1.0.0/&quot;
        class=&quot;inline-onebox&quot;&gt;Client Challenge&lt;/a&gt;&lt;br /&gt;\nThe
        documentation is available at &lt;a href=&quot;https://docs.tryton.org/relatorio/1.0.0/&quot;
        class=&quot;inline-onebox&quot;&gt;Relatorio \u2014 A templating library able
        to output odt files&lt;/a&gt;&lt;/p&gt;\n            &lt;p&gt;&lt;small&gt;1
        post - 1 participant&lt;/small&gt;&lt;/p&gt;\n            &lt;p&gt;&lt;a href=&quot;https://discuss.tryton.org/t/release-1-0-0-of-relatorio/9293&quot;&gt;Read
        full topic&lt;/a&gt;&lt;/p&gt;</description>\n\t<pubDate>Thu, 16 Jul 2026
        16:42:24 +0000</pubDate>\n</item>\n<item>\n\t<title>Tryton News: Release 1.0.0
        of GooCalendar</title>\n\t<guid>https://discuss.tryton.org/t/release-1-0-0-of-goocalendar/9292</guid>\n\t<link>https://discuss.tryton.org/t/release-1-0-0-of-goocalendar/9292</link>\n\t<description>&lt;p&gt;We
        are proud to announce the release 1.0.0 of &lt;a href=&quot;https://pypi.org/project/GooCalendar/&quot;&gt;GooCalendar&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;GooCalendar
        is a Python library that implements a calendar widget for &lt;a href=&quot;https://www.gtk.org/&quot;&gt;GTK+&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;In
        addition to bug-fixes, this release contains this following improvements:&lt;/p&gt;\n&lt;ul&gt;\n&lt;li&gt;Remove
