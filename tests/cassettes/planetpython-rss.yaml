        4.6 and Notebook 7.6 are out!&amp;lt;/a&amp;gt;&amp;lt;/strong&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;&amp;lt;a
        href=&quot;https://twotimespi.dev/?featured_on=pythonbytes&quot;&amp;gt;Tau&amp;lt;/a&amp;gt;
        \ \u2013 new small, readable terminal coding agent&amp;lt;/strong&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;&amp;lt;a
        href=&quot;https://docs.djangoproject.com/en/6.0/topics/tasks/?featured_on=pythonbytes&quot;&amp;gt;Django
        Tasks and Django 6.1&amp;lt;/a&amp;gt;&amp;lt;/strong&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Extras&amp;lt;/strong&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Joke&amp;lt;/strong&amp;gt;&amp;lt;/li&amp;gt;\n\n&amp;lt;/ul&amp;gt;&amp;lt;a
        href='https://www.youtube.com/watch?v=lJpOzcVTlho' style='font-weight: bold;'data-umami-event=&quot;Livestream-Past&quot;
        data-umami-event-episode=&quot;488&quot;&amp;gt;Watch on YouTube&amp;lt;/a&amp;gt;&amp;lt;br&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;About
        the show&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;Sponsored
        by us! Support our work through:&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;Our
        &amp;lt;a href=&quot;https://training.talkpython.fm/?featured_on=pythonbytes&quot;&amp;gt;&amp;lt;strong&amp;gt;courses
        at Talk Python&amp;lt;/strong&amp;gt;&amp;lt;/a&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Consulting
        from &amp;lt;a href=&quot;https://sixfeetup.com/?featured_on=pythonbytes&quot;&amp;gt;&amp;lt;strong&amp;gt;Six
        Feet Up&amp;lt;/strong&amp;gt;&amp;lt;/a&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Connect
        with the hosts&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;Michael:
        &amp;lt;a href=&quot;https://fosstodon.org/@mkennedy&quot;&amp;gt;Mastodon&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://bsky.app/profile/mkennedy.codes?featured_on=pythonbytes&quot;&amp;gt;BlueSky&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://x.com/mkennedy?featured_on=pythonbytes&quot;&amp;gt;X&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://www.linkedin.com/in/mkennedy/?featured_on=pythonbytes&quot;&amp;gt;LinkedIn&amp;lt;/a&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Calvin:
        &amp;lt;a href=&quot;https://sixfeetup.social/@calvin?featured_on=pythonbytes&quot;&amp;gt;Mastodon&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://bsky.app/profile/calvinhp.com?featured_on=pythonbytes&quot;&amp;gt;BlueSky&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://x.com/calvinhp?featured_on=pythonbytes&quot;&amp;gt;X&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://www.linkedin.com/in/calvinhp/?featured_on=pythonbytes&quot;&amp;gt;LinkedIn&amp;lt;/a&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Show:
        &amp;lt;a href=&quot;https://fosstodon.org/@pythonbytes&quot;&amp;gt;Mastodon&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://bsky.app/profile/pythonbytes.fm&quot;&amp;gt;BlueSky&amp;lt;/a&amp;gt;
        / &amp;lt;a href=&quot;https://x.com/PythonBytes?featured_on=pythonbytes&quot;&amp;gt;X&amp;lt;/a&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;Join
        us on YouTube at &amp;lt;a href=&quot;https://pythonbytes.fm/stream/live&quot;&amp;gt;&amp;lt;strong&amp;gt;pythonbytes.fm/live&amp;lt;/strong&amp;gt;&amp;lt;/a&amp;gt;
        to be part of the audience. Usually &amp;lt;strong&amp;gt;Tuesday at 7am PT&amp;lt;/strong&amp;gt;.
        Older video versions available there too.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;Finally,
        if you want an artisanal, hand-crafted digest of every week of the show notes
        in email form? Add your name and email to &amp;lt;a href=&quot;https://pythonbytes.fm/friends-of-the-show&quot;&amp;gt;our
        friends of the show list&amp;lt;/a&amp;gt;, we'll never share it.&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Calvin
        #1:&amp;lt;/strong&amp;gt; The trusted-publishing debate: how to do it right
        vs. why you shouldn't trust it&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;https://snarky.ca/how-to-publish-to-pypi-using-github-actions-securely/
        (Brett Cannon) and https://blog.yossarian.net/2026/07/07/You-shouldnt-trust-trusted-publishing
        (W&amp;lt;strong&amp;gt;illiam Woodruff&amp;lt;/strong&amp;gt;)&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;Trusted
        Publishing (PyPI's OIDC-based auth scheme, also now used by npm, RubyGems,
        &amp;lt;a href=&quot;http://crates.io?featured_on=pythonbytes&quot;&amp;gt;crates.io&amp;lt;/a&amp;gt;,
        NuGet) replaces long-lived API tokens with short-lived, auto-scoped credentials
        tied to CI/CD machine identity.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Yossarian's
        post: it's purely an &amp;lt;em&amp;gt;authentication&amp;lt;/em&amp;gt; mechanism
        between a machine identity and a package \u2014 it says nothing about package
        safety or quality. PyPI deliberately avoids any &quot;verified/trusted&quot;
        badge for it, unlike its verified-URL checkmarks.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Same
        logic applies to PyPI attestations: anyone can sign with any machine identity
        they control, so an attestation's presence isn't itself a trust signal.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Bottom
        line from that post: don't confuse &quot;trusted&quot; (machine-to-machine)
        with &quot;trustworthy&quot; (human judgment about the package).&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;a
        href=&quot;http://Snarky.ca?featured_on=pythonbytes&quot;&amp;gt;Snarky.ca&amp;lt;/a&amp;gt;'s
        companion piece is more practical: given GitHub Actions compromises in the
        news, the real fix is 3 concrete steps \u2014 run zizmor to lock down workflow
        permissions/checkout credentials and pin actions to commit hashes, adopt Trusted
        Publishing to eliminate stored PyPI tokens, and require manual approval via
        a GitHub environment before any publish job runs.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Takeaway
        for listeners: Trusted Publishing is good hygiene for &amp;lt;em&amp;gt;how&amp;lt;/em&amp;gt;
        you authenticate to PyPI, but it's not a substitute for securing your CI pipeline
        itself \u2014 or for actually vetting the packages you install.&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Michael
        #2: &amp;lt;a href=&quot;https://link.mail.beehiiv.com/ss/c/u001.nhis-D9RLtwtIum5I0BjhZ22Z4E_bpBKQN-16RenQ3ws2TZPhzEfwjZMSGiGAQx3p407RO5QUnbYLEGjQnorGAGD5oCA5TGTjsy6RbCrTYDXJN8BUDTRz-W0ZLYlAKrwzGPByECjf7lwVCl3nZRCGXvvhp8TvBLNfJRgnY-wJ9ktogLFr2YqqQyXhwmgzpa-6HsPhylQ_9BWTK3teRtSwrRXrLfxrVWwQXEG6Zbqaz5nRGc6xNV7pMdWvEGpfoBMUwbGl0aGZ40ZX_cYbR-sgKDJdl0v95gGqtcySNXfNgokF54k8Xao40CrloFhcFtX/4s6/5odqdEikSeKZEjId8lTcSg/h29/h001.6m_9ZXKKfEi-Sx1OcsN8EInQX8eEjhrHaS4h_Yo0T7o?featured_on=pythonbytes&quot;&amp;gt;JupyterLab
        4.6 and Notebook 7.6 are out!&amp;lt;/a&amp;gt;&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;Micha\u0142
        Krassowski's rundown - a chunky minor release: 68 features, 97 bug fixes,
        95 contributors, one of the biggest ever.&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Scratchpad
        console&amp;lt;/strong&amp;gt; (Notebook 7.6 headliner) - a console next to
        your notebook sharing its kernel, for throwaway experiments. Ctrl+B.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Jump
        to last-edited cell&amp;lt;/strong&amp;gt; - new commands hop through recently
        edited cells.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;File
        browser glow-up&amp;lt;/strong&amp;gt; - Date Created column, editable breadcrumbs
        with Tab-completion, and Open in Terminal.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Debugger&amp;lt;/strong&amp;gt;
        - sources open in the main area, floating step/continue overlay, live kernel-sources
        filter.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Custom
        layouts (Lab)&amp;lt;/strong&amp;gt; - activity bar top/bottom, draggable
        panels, four-way tab splits, per-panel Ctrl+scroll zoom.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;~5x
        faster extension builds&amp;lt;/strong&amp;gt; - webpack \u2192 Rspack, and
        &amp;lt;code&amp;gt;jupyter-builder&amp;lt;/code&amp;gt; means no full Lab
        install needed to build extensions.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Keyboard/a11y&amp;lt;/strong&amp;gt;
        - add shortcuts from the UI (no JSON), Find &amp;amp;amp; Replace in Edit
        menu (Ctrl+H).&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Calvin
        #3: &amp;lt;a href=&quot;https://twotimespi.dev/?featured_on=pythonbytes&quot;&amp;gt;Tau&amp;lt;/a&amp;gt;&amp;lt;/strong&amp;gt;
        \u2013 new small, readable terminal coding agent&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Tau&amp;lt;/strong&amp;gt;
        \u2013 new small, readable terminal coding agent (Python 3.12+), built as
        both a working tool and a teaching project for how coding agents work under
        the hood&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Install via &amp;lt;code&amp;gt;uv
        tool install tau-ai&amp;lt;/code&amp;gt;, &amp;lt;code&amp;gt;pipx&amp;lt;/code&amp;gt;,
        or &amp;lt;code&amp;gt;pip&amp;lt;/code&amp;gt;; ships a &amp;lt;code&amp;gt;tau&amp;lt;/code&amp;gt;
        CLI&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Three-layer architecture: &amp;lt;code&amp;gt;tau_ai&amp;lt;/code&amp;gt;
        (provider-neutral model layer) \u2192 &amp;lt;code&amp;gt;tau_agent&amp;lt;/code&amp;gt;
        (reusable &quot;brain&quot;: messages, tools, events, loop) \u2192 &amp;lt;code&amp;gt;tau_coding&amp;lt;/code&amp;gt;
        (CLI/TUI, file &amp;amp;amp; shell tools, sessions)&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Supports
        OpenAI, Anthropic, OpenAI Codex, OpenRouter, Hugging Face, and custom/local
        OpenAI-compatible endpoints&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Built-in
        tools (read/write/edit/bash), durable JSONL sessions with resume/branching,
        project instructions via &amp;lt;code&amp;gt;AGENTS.md&amp;lt;/code&amp;gt;,
        and context compaction&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;Core harness
        is UI-agnostic \u2014 same brain can power the TUI, print mode, or a custom
        frontend \u2014 usable as a standalone library too&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Michael
        #4: &amp;lt;a href=&quot;https://docs.djangoproject.com/en/6.0/topics/tasks/?featured_on=pythonbytes&quot;&amp;gt;Django
        Tasks and Django 6.1&amp;lt;/a&amp;gt;&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Django
        6.0 finally ships first-party background tasks&amp;lt;/strong&amp;gt; (&amp;lt;code&amp;gt;django.tasks&amp;lt;/code&amp;gt;)
        - out of Jake Howard's DEP 14, accepted May 2024, after two decades of everyone
        bolting on Celery/RQ/Huey.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;It's
        an API, not a worker.&amp;lt;/strong&amp;gt; Django handles task definition,
        validation, queuing, and result storage - it does not execute them. You bring
        the backend.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;The
        default backend traps people.&amp;lt;/strong&amp;gt; &amp;lt;code&amp;gt;ImmediateBackend&amp;lt;/code&amp;gt;
        runs tasks inline on the request thread and blocks until done - so out of
        the box &amp;lt;code&amp;gt;.enqueue()&amp;lt;/code&amp;gt; backgrounds nothing
        (a 5-second task means a 5-second response). The other built-in, &amp;lt;code&amp;gt;DummyBackend&amp;lt;/code&amp;gt;,
        runs nothing at all. Both are dev/test only.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Nice
        API otherwise:&amp;lt;/strong&amp;gt; slap &amp;lt;code&amp;gt;@task&amp;lt;/code&amp;gt;
        on a function, call &amp;lt;code&amp;gt;.enqueue()&amp;lt;/code&amp;gt;, get
        back a &amp;lt;code&amp;gt;TaskResult&amp;lt;/code&amp;gt; you look up later
        by id - with async twins like &amp;lt;code&amp;gt;aenqueue()&amp;lt;/code&amp;gt;.
        Gotcha: args and return values must survive a JSON round-trip, so a tuple
        sneakily comes back as a list.&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;The
        community local backend to know: &amp;lt;code&amp;gt;django-tasks-local&amp;lt;/code&amp;gt;&amp;lt;/strong&amp;gt;
        by Chris Beaven (SmileyChris). A &amp;lt;code&amp;gt;ThreadPoolExecutor&amp;lt;/code&amp;gt;
        backend that gives real background threads with zero infrastructure - no Redis,
        no Celery, no database - plus a &amp;lt;code&amp;gt;ProcessPoolBackend&amp;lt;/code&amp;gt;
        for CPU-bound work \u2192 &amp;lt;a href=&quot;http://github.com/lincolnloop/django-tasks-local?featured_on=pythonbytes&quot;&amp;gt;github.com/lincolnloop/django-tasks-local&amp;lt;/a&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;Its
        catch:&amp;lt;/strong&amp;gt; results live in memory, so pending tasks vanish
        on restart or deploy. Great for dev and low-traffic production; for persistence,
        drop to Jake Howard's &amp;lt;code&amp;gt;django-tasks&amp;lt;/code&amp;gt;
        (DatabaseBackend + worker command).&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Extras&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;p&amp;gt;Calvin:&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;a
        href=&quot;https://hugovk.dev/blog/2026/fixing-dict/?featured_on=pythonbytes&quot;&amp;gt;Fixing
        the dictionary with Python 3.14&amp;lt;/a&amp;gt; \u2014  Hugo van Kemenade
        stumbled on - and got fixed - a markup bug in the OED's own citation of a
        1706 use of the pi symbol.&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;Michael:&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;a
        href=&quot;https://bunny.net/blog/were-making-bunny-dns-free/?featured_on=pythonbytes&quot;&amp;gt;Bunny
        DNS is now free&amp;lt;/a&amp;gt;&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;\n\n&amp;lt;p&amp;gt;&amp;lt;strong&amp;gt;Jokes:&amp;lt;/strong&amp;gt;&amp;lt;/p&amp;gt;\n\n&amp;lt;ul&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;What's
        the object-oriented way to become wealthy?&amp;lt;/strong&amp;gt; Inheritance&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;To
        understand what recursion is...&amp;lt;/strong&amp;gt; You must first understand
        what recursion is&amp;lt;/li&amp;gt;\n&amp;lt;li&amp;gt;&amp;lt;strong&amp;gt;3
        SQL statements walk into a NoSQL bar.&amp;lt;/strong&amp;gt; Soon, they walk
        out They couldn't find a table.&amp;lt;/li&amp;gt;\n&amp;lt;/ul&amp;gt;</description>\n\t<pubDate>Tue,
        14 Jul 2026 08:00:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Django Weblog:
        Explore the DjangoCon US 2026 Speaker Lineup and Reserve Your Spot</title>\n\t<guid>https://www.djangoproject.com/weblog/2026/jul/13/explore-the-djangocon-us-2026-speaker-lineup-and-r/</guid>\n\t<link>https://www.djangoproject.com/weblog/2026/jul/13/explore-the-djangocon-us-2026-speaker-lineup-and-r/</link>\n\t<description>&lt;p&gt;&lt;a
        href=&quot;https://2026.djangocon.us&quot;&gt;DjangoCon US 2026&lt;/a&gt;
        is just around the corner, and now is the perfect time to start planning your
        conference experience.&lt;/p&gt;\n&lt;p&gt;Our &lt;a href=&quot;https://2026.djangocon.us/news/announcing-lineup/&quot;&gt;speaker
        lineup is now available&lt;/a&gt;, featuring talks from Django contributors,
        maintainers, educators, and community members covering everything from web
        development and APIs to deployment, security, testing, AI, and the future
        of the Django ecosystem.&lt;/p&gt;\n&lt;p&gt;Whether you're attending your
        first DjangoCon US or returning to reconnect with friends and colleagues,
        you'll find opportunities to learn, share ideas, and meet people from across
        the global Django community.&lt;/p&gt;\n&lt;p&gt;Beyond the talks, your conference
        registration includes access to tutorials, Open Spaces, community sprints,
        hallway conversations, and social events that make DjangoCon US a unique experience.&lt;/p&gt;\n&lt;p&gt;If
        you haven't registered yet, there's still time to join us in Chicago, August
        24\u201328.&lt;/p&gt;\n&lt;p&gt;Register for DjangoCon US 2026: &lt;a href=&quot;https://2026.djangocon.us&quot;&gt;https://2026.djangocon.us&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;Browse
        the speaker lineup: &lt;a href=&quot;https://2026.djangocon.us/news/announcing-lineup/&quot;&gt;https://2026.djangocon.us/news/announcing-lineup/&lt;/a&gt;&lt;/p&gt;\n&lt;p&gt;We'll
        be sharing more updates in the coming weeks, including the full conference
        schedule, travel reminders, and everything you need to make the most of your
        time at DjangoCon US.&lt;/p&gt;\n&lt;p&gt;We look forward to seeing you in
        Chicago this August!&lt;/p&gt;</description>\n\t<pubDate>Mon, 13 Jul 2026
        22:51:23 +0000</pubDate>\n</item>\n<item>\n\t<title>Hugo van Kemenade: Security:
        line goes up</title>\n\t<guid>https://hugovk.dev/blog/2026/security-line-goes-up/</guid>\n\t<link>https://hugovk.dev/blog/2026/security-line-goes-up/</link>\n\t<description>&lt;p&gt;Like
        many other projects, CPython is experiencing a huge increase in security reports.&lt;/p&gt;\n&lt;h2
        id=&quot;cves-per-year&quot; class=&quot;relative group&quot;&gt;CVEs per
        year &lt;span class=&quot;absolute top-0 w-6 transition-opacity opacity-0
        -start-6 not-prose group-hover:opacity-100&quot;&gt;&lt;a class=&quot;group-hover:text-primary-300
        dark:group-hover:text-neutral-700&quot; href=&quot;https://hugovk.dev/tags/python/index.xml#cves-per-year&quot;&gt;#&lt;/a&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p&gt;Last
        month, PSF Security Developer-in-Residence &lt;a href=&quot;https://sethmlarson.dev/&quot;&gt;Seth
        Larson&lt;/a&gt;\nposted a chart of\n&lt;a href=&quot;https://mastodon.social/@sethmlarson/116680835974208152&quot;&gt;CVEs
        per year&lt;/a&gt;, showing a\nlarge increase in 2026:&lt;/p&gt;\n&lt;p&gt;\n\n\n\n\n\n\n
        \n \n\n\n\n\n\n\n\n\n \n \n \n \n \n \n \n \n &lt;img width=&quot;1257&quot;
        height=&quot;705&quot; class=&quot;mx-auto my-0 rounded-md&quot; alt=&quot;2007-2024
        all below 20 per year. 2025 and year-to-date 2026 had just over 20, with 2026
        extrapolated to around 65.&quot; src=&quot;https://hugovk.dev/blog/2026/security-line-goes-up/cves-per-year_hu_2601403f38fe525a.png&quot;
        /&gt;\n \n \n\n\n\n&lt;/p&gt;\n&lt;p&gt;But this only represents the &lt;em&gt;output&lt;/em&gt;
        of security work, and doesn&amp;rsquo;t show all the work\ndealing with incoming
        reports. Many are closed and dealt with as non-security bug\nreports instead;
        many are closed as neither security nor bug reports.&lt;/p&gt;\n&lt;p&gt;Let&amp;rsquo;s
        reveal some of this unseen work by the\n&lt;a href=&quot;https://devguide.python.org/security/psrt/&quot;&gt;Python
        Security Response Team&lt;/a&gt; (PSRT).&lt;/p&gt;\n&lt;h2 id=&quot;ghsas-by-month&quot;
        class=&quot;relative group&quot;&gt;GHSAs by month &lt;span class=&quot;absolute
        top-0 w-6 transition-opacity opacity-0 -start-6 not-prose group-hover:opacity-100&quot;&gt;&lt;a
        class=&quot;group-hover:text-primary-300 dark:group-hover:text-neutral-700&quot;
        href=&quot;https://hugovk.dev/tags/python/index.xml#ghsas-by-month&quot;&gt;#&lt;/a&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p&gt;Here
        are the number of incoming GitHub Security Advisories (GHSA) reports created
        since\nJuly 2024:&lt;/p&gt;\n&lt;p&gt;\n\n\n\n\n\n\n \n \n\n\n\n\n\n\n\n\n
        \n \n \n \n \n \n \n \n &lt;img width=&quot;2100&quot; height=&quot;900&quot;
        class=&quot;mx-auto my-0 rounded-md&quot; alt=&quot;Chart of new security
        reports. Single digits or zero per month from 2024, increasing to around 40
        in 2026.&quot; src=&quot;https://hugovk.dev/blog/2026/security-line-goes-up/ghsas-by-month_hu_e0223ff9b32735ff.png&quot;
        /&gt;\n \n \n\n\n\n&lt;/p&gt;\n&lt;h2 id=&quot;ghsas-by-year&quot; class=&quot;relative
        group&quot;&gt;GHSAs by year &lt;span class=&quot;absolute top-0 w-6 transition-opacity
        opacity-0 -start-6 not-prose group-hover:opacity-100&quot;&gt;&lt;a class=&quot;group-hover:text-primary-300
        dark:group-hover:text-neutral-700&quot; href=&quot;https://hugovk.dev/tags/python/index.xml#ghsas-by-year&quot;&gt;#&lt;/a&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p&gt;Here
        is the same thing by year, and remembering we&amp;rsquo;re only &lt;em&gt;halfway
        through 2026&lt;/em&gt;:&lt;/p&gt;\n&lt;p&gt;\n\n\n\n\n\n\n \n \n\n\n\n\n\n\n\n\n
        \n \n \n \n \n \n \n \n &lt;img width=&quot;2100&quot; height=&quot;900&quot;
        class=&quot;mx-auto my-0 rounded-md&quot; alt=&quot;18 in 2024, 41 in 2025,
        175 so far in 2026.&quot; src=&quot;https://hugovk.dev/blog/2026/security-line-goes-up/ghsas-by-year_hu_fa7a5184a8320d7e.png&quot;
        /&gt;\n \n \n\n\n\n&lt;/p&gt;\n&lt;h2 id=&quot;email-reports-by-month&quot;
        class=&quot;relative group&quot;&gt;Email reports by month &lt;span class=&quot;absolute
        top-0 w-6 transition-opacity opacity-0 -start-6 not-prose group-hover:opacity-100&quot;&gt;&lt;a
        class=&quot;group-hover:text-primary-300 dark:group-hover:text-neutral-700&quot;
        href=&quot;https://hugovk.dev/tags/python/index.xml#email-reports-by-month&quot;&gt;#&lt;/a&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p&gt;We&amp;rsquo;ve
        only fairly recently been\n&lt;a href=&quot;https://devguide.python.org/security/policy/&quot;&gt;encouraging
        new reports&lt;/a&gt; be made via\nGHSA. Before this, they were usually made
        by email. The next chart is the number of\nemail discussions (or threads)
        and participants by month:&lt;/p&gt;\n&lt;p&gt;\n\n\n\n\n\n\n \n \n\n\n\n\n\n\n\n\n
        \n \n \n \n \n \n \n \n &lt;img width=&quot;2100&quot; height=&quot;900&quot;
        class=&quot;mx-auto my-0 rounded-md&quot; alt=&quot;Number of discussions
        and participants per month follow each other closely. Single digits from 2014,
        around 20 by 2019, 40 by 2021 and 2022, a dip to 15 for 2023 to 2025, up to
        50 for 2026 so far.&quot; src=&quot;https://hugovk.dev/blog/2026/security-line-goes-up/email_hu_f73ebb8b42dcf9fe.png&quot;
        /&gt;\n \n \n\n\n\n&lt;/p&gt;\n&lt;h2 id=&quot;thanks&quot; class=&quot;relative
        group&quot;&gt;Thanks &lt;span class=&quot;absolute top-0 w-6 transition-opacity
        opacity-0 -start-6 not-prose group-hover:opacity-100&quot;&gt;&lt;a class=&quot;group-hover:text-primary-300
        dark:group-hover:text-neutral-700&quot; href=&quot;https://hugovk.dev/tags/python/index.xml#thanks&quot;&gt;#&lt;/a&gt;&lt;/span&gt;&lt;/h2&gt;&lt;p&gt;Big
        thanks to Seth for all his work as Security Developer-in-Residence: helping
        shepherd\nall these reports, developing a\n&lt;a href=&quot;https://devguide.python.org/security/policy/&quot;&gt;security
        policy&lt;/a&gt; to improve the quality\nof incoming reports and help us assess
        them, and defining PSRT membership and\nresponsibilities via &lt;a href=&quot;https://peps.python.org/pep-0811/&quot;&gt;PEP
        811&lt;/a&gt; to build an active\nteam. All this would be much harder without
        his guidance! And thanks to\n&lt;a href=&quot;https://alpha-omega.dev/&quot;&gt;Alpha-Omega&lt;/a&gt;
        for sponsoring his position at the PSF.&lt;/p&gt;</description>\n\t<pubDate>Mon,
        13 Jul 2026 20:44:50 +0000</pubDate>\n</item>\n<item>\n\t<title>Talk Python
        to Me: #555: Marimo Pair - A Canvas for Agent + Developers Collaboration</title>\n\t<guid>https://talkpython.fm/episodes/show/555/marimo-pair-a-canvas-for-agent-developers-collaboration</guid>\n\t<link>https://talkpython.fm/episodes/show/555/marimo-pair-a-canvas-for-agent-developers-collaboration</link>\n\t<description>Coding
        agents have gotten really good at one kind of work. You scope a feature, edit
        some files, run the tests, ship it. It all happens on disk. But that is not
        how data work feels. You load something, you look at it, you run a cell, you
        watch how it responds, and you decide the next move from whatever is sitting
        in memory. And until now, your agent couldn't see any of that. It only saw
        the files. Never the live state.\n&amp;lt;br/&amp;gt;\n\n&amp;lt;br/&amp;gt;\nThis
        episode, that wall comes down. marimo pair drops a coding agent right inside
        a running notebook, with full access to every variable Python is holding in
        memory. The notebook becomes a shared canvas. You point, it runs the code.
        You tell it to zoom in on the Picasso paintings, and the chart just updates.
        No MCP tools to wire up, no schema to describe. Just Python, and an agent
        that can finally see what you see. Trevor Manz is back to walk us through
        it.&amp;lt;br/&amp;gt;\n&amp;lt;br/&amp;gt;\n&amp;lt;strong&amp;gt;Episode
        sponsors&amp;lt;/strong&amp;gt;&amp;lt;br/&amp;gt;\n&amp;lt;br/&amp;gt;\n&amp;lt;a
        href='https://talkpython.fm/sentry'&amp;gt;Sentry Error Monitoring, Code talkpython26&amp;lt;/a&amp;gt;&amp;lt;br&amp;gt;\n&amp;lt;a
        href='https://talkpython.fm/training'&amp;gt;Talk Python Courses&amp;lt;/a&amp;gt;&amp;lt;br/&amp;gt;\n&amp;lt;br/&amp;gt;\n&amp;lt;h2
        class=&quot;links-heading mb-4&quot;&amp;gt;Links from the show&amp;lt;/h2&amp;gt;\n&amp;lt;div&amp;gt;&amp;lt;strong&amp;gt;marimo
        pair&amp;lt;/strong&amp;gt;: &amp;lt;a href=&quot;https://marimo.io/pair?featured_on=talkpython&quot;
