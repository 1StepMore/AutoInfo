        than 3.9&lt;/li&gt;\n&lt;li&gt;Upgrade to pyproject&lt;/li&gt;\n&lt;/ul&gt;\n&lt;p&gt;GooCalendar
        is available on PyPI: &lt;a href=&quot;https://pypi.org/project/GooCalendar/1.0.0/&quot;
        class=&quot;inline-onebox&quot;&gt;GooCalendar \xB7 PyPI&lt;/a&gt;&lt;br /&gt;\nThe
        documentation is available at &lt;a href=&quot;https://docs.tryton.org/goocalendar/1.0.0/&quot;
        class=&quot;inline-onebox&quot;&gt;goocalendar \u2014 Calendar widget \u2014
        A calendar widget for GTK&lt;/a&gt;&lt;/p&gt;\n            &lt;p&gt;&lt;small&gt;1
        post - 1 participant&lt;/small&gt;&lt;/p&gt;\n            &lt;p&gt;&lt;a href=&quot;https://discuss.tryton.org/t/release-1-0-0-of-goocalendar/9292&quot;&gt;Read
        full topic&lt;/a&gt;&lt;/p&gt;</description>\n\t<pubDate>Thu, 16 Jul 2026
        16:25:29 +0000</pubDate>\n</item>\n<item>\n\t<title>Seth Michael Larson: EuroPython
        2026: Learning from the \u201Cnot-so-secret\u201D Python security cabal</title>\n\t<guid>https://sethmlarson.dev/europython-2026-security-talk?utm_campaign=rss</guid>\n\t<link>https://sethmlarson.dev/europython-2026-security-talk?utm_campaign=rss</link>\n\t<description>&lt;p&gt;I
        delivered this talk at EuroPython 2026, I'll update this blog post once the\nrecording
        is available on &lt;a href=&quot;https://www.youtube.com/c/EuroPythonConference&quot;&gt;EuroPython's
        YouTube channel&lt;/a&gt;. Below are the slides\nand full list of links and
        resources included. This talk is\na continuation of a talk I gave a year ago:
        \u201C&lt;a href=&quot;https://www.youtube.com/watch?v=V9n2jmkeRf0&quot;&gt;Security
        Work isn\u2019t Special&lt;/a&gt;\u201D\nas the keynote for OpenSSF Community
        Day NA where I lamented on how\nsecurity work didn't match other Open Source
        contribution models like\ndocumentation, community, or code contributions.&lt;/p&gt;\n\n&lt;!--
        more --&gt;\n\n&lt;blockquote&gt;\n  &lt;p&gt;My work as the Security Developer-in-Residence
        at the &lt;a href=&quot;https://www.python.org/psf-landing/&quot;&gt;Python
        Software Foundation&lt;/a&gt; is sponsored\n  by &lt;a href=&quot;https://alpha-omega.dev/&quot;&gt;Alpha-Omega&lt;/a&gt;.
        Thanks to Alpha-Omega for supporting\n  security in the Python ecosystem.&lt;/p&gt;\n&lt;/blockquote&gt;\n\n&lt;h2&gt;Links
        and Resources&lt;/h2&gt;\n\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=&quot;https://speakerdeck.com/sethmlarson/learning-from-the-not-so-secret-python-security-cabal-europython-2026&quot;&gt;Slides&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://pyfound.blogspot.com&quot;&gt;Python Software Foundation
        Blog&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://blog.python.org&quot;&gt;Python
        Insider Blog&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://www.youtube.com/watch?v=V9n2jmkeRf0&quot;&gt;Security
        Work isn\u2019t Special&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://hugovk.dev/blog/2026/security-line-goes-up/&quot;&gt;Security
        Line Goes Up&lt;/a&gt; by Hugo van Kemenade&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://sethmlarson.dev/feed&quot;&gt;Vulnerability
        Reports are not special anymore&lt;/a&gt; by Filippo Valsorda&lt;/li&gt;\n&lt;li&gt;&lt;a
        href=&quot;https://lkml.org/lkml/2026/5/17/896&quot;&gt;LLM generated vulnerabilities&lt;/a&gt;
        by Linus Torvalds&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://devguide.python.org/security/policy/&quot;&gt;Python
        Security Policy and Threat Model&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://devguide.python.org/security/psrt&quot;&gt;Python
        Security Response Team&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=&quot;https://peps.python.org/pep-0811/&quot;&gt;PEP
        811 - Defining Python Security Response Team membership and responsibilities&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;br
        /&gt;&lt;hr /&gt;&lt;p&gt;Thanks for reading \u2665 I would love to hear your
        thoughts! Contact me via &lt;a href=&quot;https://mastodon.social/@sethmlarson&quot;&gt;Mastodon&lt;/a&gt;,
        &lt;a href=&quot;https://bsky.app/profile/sethmlarson.dev&quot;&gt;Bluesky&lt;/a&gt;,
        or &lt;a href=&quot;mailto:sethmichaellarson@gmail.com&quot;&gt;email&lt;/a&gt;.
        Browse the &lt;a href=&quot;https://sethmlarson.dev/&quot;&gt;blog archive&lt;/a&gt;.
        Check out my &lt;a href=&quot;https://sethmlarson.dev/blogroll&quot;&gt;blogroll&lt;/a&gt;.&lt;/p&gt;&lt;hr
        /&gt;&lt;br /&gt;</description>\n\t<pubDate>Thu, 16 Jul 2026 00:00:00 +0000</pubDate>\n</item>\n<item>\n\t<title>Python
        Software Foundation: Affirm Your PSF Membership Voting Status</title>\n\t<guid>https://pyfound.blogspot.com/2026/07/affirm-PSF-voting-status-2026.html</guid>\n\t<link>https://pyfound.blogspot.com/2026/07/affirm-PSF-voting-status-2026.html</link>\n\t<description>&lt;p&gt;Every
        Python Software Foundation (PSF) voting-eligible Member (Supporting, Contributing,
        and Fellow) needs to affirm their membership to vote in this year\u2019s PSF
        Board and Python Packaging Council (PPC) elections.&lt;/p&gt;&lt;p&gt;&lt;b&gt;If
        you wish to vote in either the PSF Board or Python Packaging Council elections,
        you must affirm your intention to vote for each election no later than Tuesday,
        August 25th, 2:00 pm UTC, to participate in this year\u2019s elections. &lt;/b&gt;This
        year\u2019s election votes begin Tuesday, September 1st, 2:00 pm UTC, and
        close on Tuesday, September 15th, 2:00 pm UTC.&amp;nbsp;&lt;br /&gt;&lt;/p&gt;&lt;h2&gt;Election
        communications from psfmember.org&lt;/h2&gt;&lt;p&gt;You should have received
        an email from &quot;psf@psfmember.org &amp;lt;Python Software Foundation&amp;gt;&quot;
        with the subject &quot;[Action Required] Affirm your PSF Membership voting
        intention for the 2026 PSF Board Election&quot; and/or \u201C2026 Python Packaging
        Council Inaugural Election Information &amp;amp; Schedule\u201D that contains
        information on how to affirm your voting status. If you were expecting to
        receive the email but have not (make sure to check your spam!), please email
        psf-elections@pyfound.org for the PSF Board election or pc-elections@python.org,
        and we\u2019ll assist you. &lt;i&gt;Please note: If you opted out of emails
        related to your membership, you did not receive these emails.&amp;nbsp;&lt;/i&gt;&lt;/p&gt;&lt;p&gt;PSF
        Members should review their communication preferences on psfmember.org if
        you would like to opt in or out of receiving emails about the PSF Board, PPC
        elections, or both. Here\u2019s how:&lt;br /&gt;&lt;/p&gt;&lt;ul&gt;&lt;li&gt;Login
        to psfmember.org&lt;/li&gt;&lt;li&gt;Navigate to your \u201CProfile\u201D
        page&lt;/li&gt;&lt;li&gt;Click the \u201CName and Address\u201D tab&lt;/li&gt;&lt;li&gt;Scroll
        down, designate your preferences&lt;/li&gt;&lt;li&gt;Click submit&lt;/li&gt;&lt;/ul&gt;&lt;p&gt;If
        you had previously opted out of communications from the PSF through psfmember.org
        and would like to review or change your preference, we encourage you to update
        them using the instructions above. The PSF only sends a handful of election
        and fundraising related communications every year via psfmember.org. The PSF
        newsletter runs through a separate mailing list (and &lt;a href=&quot;https://www.python.org/psf/newsletter/&quot;
        target=&quot;_blank&quot;&gt;we welcome you to sign up&lt;/a&gt;!).&amp;nbsp;&lt;br
        /&gt;&lt;/p&gt;&lt;h2&gt;How to affirm your intention to vote&lt;/h2&gt;&lt;p&gt;You
        can affirm your voting intention by following the steps in &lt;a href=&quot;https://www.youtube.com/watch?v=lWfyvPqAAJs&quot;
        target=&quot;_blank&quot;&gt;our video tutorial&lt;/a&gt;:&lt;br /&gt;&lt;/p&gt;&lt;ul&gt;&lt;li&gt;Log
        in to psfmember.org&lt;/li&gt;&lt;li&gt;Choose \u201CYour Memberships\u201D
        page at the top right to check your eligibility to vote (You must be a Contributing,
        Supporting, or Fellow member)&lt;/li&gt;&lt;li&gt;Choose \u201CVoting Affirmation\u201D
        page at the top right&lt;/li&gt;&lt;li&gt;Select your preferred intention
        for voting in 2026 (which now includes a second affirmation regarding your
        intention to vote in the Python Packaging Council election)&lt;/li&gt;&lt;li&gt;Click
        the \u201CSubmit\u201D button&lt;/li&gt;&lt;/ul&gt;&lt;h2&gt;Need to check
        your membership status?&lt;/h2&gt;&lt;p&gt;Log on to psfmember.org and visit
        your &lt;a href=&quot;https://psfmember.org/user-information&quot; target=&quot;_blank&quot;&gt;PSF
        Member User Information page&lt;/a&gt; to see your membership record and status.
        If you are a voting-eligible member (active Supporting, Contributing, and
        Fellow members of the PSF) and do not already have a login, please &lt;a href=&quot;https://psfmember.org/wp-login.php?action=register&quot;
        target=&quot;_blank&quot;&gt;create an account on psfmember.org&lt;/a&gt;
        and then email psf-elections@pyfound.org so we can link your membership to
        your account. Please ensure you have an account linked to your membership
        so that we can have the most up-to-date contact information for you in the
        future.&amp;nbsp;&lt;br /&gt;&lt;/p&gt;&lt;h2&gt;PSF Bylaws&lt;/h2&gt;&lt;p&gt;Section
        4.2 of the &lt;a href=&quot;https://www.python.org/psf/bylaws/&quot; target=&quot;_blank&quot;&gt;PSF
        Bylaws&lt;/a&gt; requires that \u201CMembers of any membership class with
        voting rights must affirm each year to the corporation in writing that such
        member intends to be a voting member for such year.\u201D&lt;/p&gt;&lt;p&gt;Our
        motivation is to ensure that our elections can meet quorum as required by
        Section 3.9 of our bylaws. As our membership has grown, we have seen that
        an increasing number of Contributing and Fellow members with indefinite membership
        do not engage with our annual election, making quorum difficult to reach.&amp;nbsp;&lt;/p&gt;&lt;p&gt;An
        election that does not reach quorum is invalid. This would cause the whole
        voting process to be re-held, resulting in fewer voters and an undue amount
        of effort on the part of the PSF Staff.&lt;br /&gt;&lt;/p&gt;&lt;h2&gt;Reminders
        about membership and voting&lt;/h2&gt;&lt;p&gt;Reminder: If you were formerly
        a Managing member, your membership type was changed last year to Contributing
        per 2024\u2019s &lt;a href=&quot;https://github.com/psf/bylaws/compare/a35a6071de181adbb7a160d5d1447e7b0272359c...359cbc540f2f6bf00bc46b9dbe3e00a950612c27&quot;
        target=&quot;_blank&quot;&gt;Bylaw change that merged Managing and Contributing
        memberships&lt;/a&gt;.&amp;nbsp;&lt;br /&gt;&lt;br /&gt;Per another recent
        Bylaw change that allows for &lt;a href=&quot;https://github.com/python/psf-bylaws/compare/a35a6071de181adbb7a160d5d1447e7b0272359c...6bac449&quot;
        target=&quot;_blank&quot;&gt;simplifying the voter affirmation process by
        treating past voting activity as intent to continue voting&lt;/a&gt;, if you
        voted last year, you will automatically be added to the 2026 voter roll. &lt;i&gt;Please
        note: If you removed or changed your email on psfmember.org, you may not automatically
        be added to this year's voter roll.&amp;nbsp;&lt;/i&gt;&lt;br /&gt;&lt;/p&gt;&lt;h2&gt;What
        happens next?&lt;/h2&gt;&lt;p&gt;You\u2019ll get an email from OpaVote with
        a ballot (or two!) on or right before September 1st, and then you can vote!&lt;/p&gt;&lt;p&gt;Check
        out our &lt;a href=&quot;https://www.python.org/psf/membership/&quot; target=&quot;_blank&quot;&gt;PSF
        Membership page&lt;/a&gt; to learn more. If you have questions about membership,
        nominations, or this year\u2019s Board election, please email psf-elections@pyfound.org
        or join the &lt;a href=&quot;https://discord.gg/4Hm36PPgpG&quot; target=&quot;_blank&quot;&gt;PSF
        Discord&lt;/a&gt; for the &lt;a href=&quot;https://pyfound.blogspot.com/2025/10/a-new-psf-board-another-year-of-psf.html&quot;
        target=&quot;_blank&quot;&gt;upcoming Board Office Hours&lt;/a&gt; on August
        11th, 9 PM UTC. You are also welcome to &lt;a href=&quot;https://discuss.python.org/t/2026-psf-board-election/107797&quot;
        target=&quot;_blank&quot;&gt;join the discussion about the PSF Board election
        on the Python Discuss forum&lt;/a&gt;.&lt;/p&gt;</description>\n\t<pubDate>Wed,
        15 Jul 2026 11:06:17 +0000</pubDate>\n</item>\n<item>\n\t<title>Django Weblog:
        Supporting the Triptych Project</title>\n\t<guid>https://www.djangoproject.com/weblog/2026/jul/15/supporting-the-triptych-project/</guid>\n\t<link>https://www.djangoproject.com/weblog/2026/jul/15/supporting-the-triptych-project/</link>\n\t<description>&lt;p&gt;The
        Django Steering Council \u2014 in its role as the DSF's arm for technical\ngovernance
        \u2014 has provided a Letter of Collaboration in support of a funding\napplication
        by Carson Gross and Alex Petros to advance the &lt;a href=&quot;https://triptychproject.org&quot;&gt;Triptych\nProject&lt;/a&gt;:
        three proposals to make HTML itself more\nexpressive, in every browser, by
        default.&lt;/p&gt;\n&lt;p&gt;Here's why, and how you can help.&lt;/p&gt;\n&lt;h2
        id=&quot;s-html-over-the-wire-and-django&quot;&gt;HTML over the wire, and
        Django&lt;/h2&gt;\n&lt;p&gt;The last few years have seen a move back towards
        serving multipage\napplications, with server-rendered templates. The &lt;a
        href=&quot;https://htmx.org&quot;&gt;HTMX&lt;/a&gt;\nlibrary has probably
        had the biggest impact in the Django space, but\n&lt;a href=&quot;https://unpoly.com&quot;&gt;Unpoly&lt;/a&gt;,
        &lt;a href=&quot;https://turbo.hotwired.dev&quot;&gt;Turbo&lt;/a&gt;, and
        others\nare part of the same story: send HTML over the wire, let the browser
        do what\nbrowsers do, and skip the client-side application layer where you
        don't really\nneed it. It's a simpler model of the web \u2014 and it's one
        that speaks to Django's\nheart.&lt;/p&gt;\n&lt;p&gt;This isn't a movement
        Django has watched from the sidelines. Template partials,\nadded in Django
        6.0, were directly inspired by the patterns these libraries\nmake natural.&lt;/p&gt;\n&lt;h2
        id=&quot;s-the-triptych-project&quot;&gt;The Triptych Project&lt;/h2&gt;\n&lt;p&gt;&lt;a
        href=&quot;https://triptychproject.org&quot;&gt;The Triptych Project&lt;/a&gt;
        takes the core insights from\nHTMX (and the related libraries) and proposes
        them for the HTML standard\nitself. Three small additions:&lt;/p&gt;\n&lt;ol&gt;\n&lt;li&gt;&lt;strong&gt;PUT,
        PATCH, and DELETE methods for forms&lt;/strong&gt; \u2014 completing HTML's
        HTTP vocabulary.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Button actions&lt;/strong&gt;
        \u2014 buttons that make HTTP requests without a wrapping form. This is the
        current focus.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Partial page replacement&lt;/strong&gt;
        \u2014 links, forms, and buttons that target part of the DOM.&lt;/li&gt;\n&lt;/ol&gt;\n&lt;p&gt;Together
        these aim to make it possible to build far more of the web with plain HTML
        \u2014 no JavaScript dependency, no library, nothing to ship or maintain.&lt;/p&gt;\n&lt;h2
        id=&quot;s-button-actions&quot;&gt;Button actions&lt;/h2&gt;\n&lt;p&gt;The
        current proposal (&lt;a href=&quot;https://github.com/whatwg/html/issues/12330&quot;&gt;WHATWG
        #12330&lt;/a&gt;, &lt;a href=&quot;https://triptychproject.org/proposals/button-actions&quot;&gt;full
        proposal&lt;/a&gt;) adds the &lt;code&gt;action&lt;/code&gt; and &lt;code&gt;method&lt;/code&gt;
        attributes to &lt;code&gt;&amp;lt;button&amp;gt;&lt;/code&gt;. The canonical
        example is logout. Today there's no semantic way to write a logout button;
        you have to wrap it in a form:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;&amp;lt;form
        action=/logout method=POST&amp;gt;\n  &amp;lt;button&amp;gt;Logout&amp;lt;/button&amp;gt;\n&amp;lt;/form&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Every
        Django developer has written this kind of thing. With\nbutton actions we could
        write the simpler single line:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;&amp;lt;button
        action=/logout method=POST&amp;gt;Logout&amp;lt;/button&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;This
        isn't abstract for us. The Django admin's submit row holds multiple\nbuttons,
        and a link disguised as a button:&lt;/p&gt;\n&lt;pre&gt;&lt;code&gt;&amp;lt;div
        class=&quot;submit-row&quot;&amp;gt;\n  &amp;lt;input type=&quot;submit&quot;
        value=&quot;Save&quot; class=&quot;default&quot; name=&quot;_save&quot;&amp;gt;\n
        \ &amp;lt;input type=&quot;submit&quot; value=&quot;Save and add another&quot;
        name=&quot;_addanother&quot;&amp;gt;\n  &amp;lt;input type=&quot;submit&quot;
        value=&quot;Save and continue editing&quot; name=&quot;_continue&quot;&amp;gt;\n
        \ &amp;lt;a href=&quot;/admin/auth/user/.../delete/&quot; class=&quot;deletelink&quot;&amp;gt;Delete&amp;lt;/a&amp;gt;\n&amp;lt;/div&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;Here,
        all the save inputs lead to the same action URL from the wrapping form.\nThe
        view then branches on the submitted name value. That, of course, works, but\nwe
        can imagine simpler, more flexible ideas being enabled via the &lt;a href=&quot;https://triptychproject.org/proposals/button-actions#multi-action-\npages&quot;&gt;Multi-Action\nPages\nexamples&lt;/a&gt;
        in the proposal.&lt;/p&gt;\n&lt;p&gt;The disguised submit link leads to the
        deletion confirmation page, where we\nthen submit a form to confirm the action.
        That's the &lt;em&gt;correct&lt;/em&gt; behaviour, but\nthe markup confuses
        the intent: this isn't (really) a navigation to a new page,\nit's the first
        step of an action \u2014 deleting the object. The proposal's\ndiscussion of
        &lt;a href=&quot;https://triptychproject.org/proposals/button-actions#buttons-vs-links&quot;&gt;Buttons
        vs\nLinks&lt;/a&gt;\ndescribes situations we come up against writing applications
        regularly.&lt;/p&gt;\n&lt;p&gt;The goal here is simpler patterns that will
        help us write better markup.&lt;/p&gt;\n&lt;h2 id=&quot;s-why-were-supporting-this&quot;&gt;Why
        we're supporting this&lt;/h2&gt;\n&lt;p&gt;The Django Software Foundation's
        mission includes a commitment to &lt;a href=&quot;https://www.djangoproject.com/foundation/&quot;&gt;&quot;advance
        the\nstate of the art in Web development&quot;&lt;/a&gt;. Standards work is\nthat
        in its purest form: an improvement to HTML lands for everyone, in every\nframework,
        in every browser, indefinitely.&lt;/p&gt;\n&lt;p&gt;It's also slow, painstaking
        work \u2014 specification, implementer engagement, web\nplatform tests \u2014
        that needs sustained attention. Carson and Alex are applying\nfor funds so
        that people can devote real time to it. Our Letter of\nCollaboration is a
        concrete contribution to that application.&lt;/p&gt;\n&lt;h2 id=&quot;s-how-you-can-help&quot;&gt;How
        you can help&lt;/h2&gt;\n&lt;p&gt;If your company builds on Django, or indeed
        any other framework \u2014 with HTMX,\nUnpoly, Turbo, or plain HTML forms
        \u2014 this work benefits you directly. Carson\nand Alex are seeking non-binding
        letters of support on official letterhead for\nthe funding application. Details
        and contacts are on the &lt;a href=&quot;https://triptychproject.org&quot;&gt;Triptych
        Project site&lt;/a&gt;.&lt;/p&gt;\n&lt;p&gt;Individually, do &lt;a href=&quot;https://triptychproject.org&quot;&gt;read
        the proposals&lt;/a&gt;, weigh in constructively on the &lt;a href=&quot;https://github.com/whatwg/html/issues/12330&quot;&gt;WHATWG\nissues&lt;/a&gt;,
        and spread the word.&lt;/p&gt;\n&lt;p&gt;A simpler web is a better web. We're
        glad to support work that moves HTML in\nthat direction.&lt;/p&gt;</description>\n\t<pubDate>Wed,
        15 Jul 2026 11:00:20 +0000</pubDate>\n</item>\n<item>\n\t<title>PyCoder\u2019s
        Weekly: Issue #743: Stacks &amp;amp; Queues, Django F-Expressions, MCP Clients,
        and More (2026-07-14)</title>\n\t<guid>https://pycoders.com/issues/743</guid>\n\t<link>https://pycoders.com/issues/743</link>\n\t<description>&lt;p&gt;
        &lt;span&gt;#743 \u2013 JULY 14, 2026&lt;/span&gt;&lt;br /&gt; &lt;span&gt;&lt;a
        href=&quot;https://pycoders.com/issues/743/feed&quot;&gt;View in Browser \xBB&lt;/a&gt;&lt;/span&gt;
        &lt;/p&gt; &lt;p&gt;&lt;a href=&quot;https://pycoders.com&quot;&gt;&lt;img
        alt=&quot;The PyCoder&amp;rsquo;s Weekly Logo&quot; src=&quot;https://cdn.pycoders.com/37bdf31dc645f968ffb90196e5d38ff5&quot;
        /&gt;&lt;/a&gt;&lt;/p&gt; &lt;hr /&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16758/feed&quot;
        target=&quot;_blank&quot;&gt;Stacks and Queues in Python&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; This post shows you how to use a Python list for stack operations
        (last-in, first-out) and a &lt;code&gt;deque&lt;/code&gt; from the collections
        module for queue operations (first-in, first-out).&lt;br /&gt; &lt;span&gt;&lt;a
        href=&quot;https://pycoders.com/link/16758/feed&quot; target=&quot;_blank&quot;&gt;TREY
        HUNNER&lt;/a&gt;&lt;/span&gt; &lt;/p&gt; &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a
        href=&quot;https://pycoders.com/link/16750/feed&quot; target=&quot;_blank&quot;&gt;Nifty
        Django Feature: F Expressions&lt;/a&gt;&lt;/h3&gt; &lt;p&gt; Django&amp;rsquo;s
        F-Expression provides a way of querying fields from the ORM. They&amp;rsquo;re
        particularly handy to traverse relationships in more complex queries.&lt;br
        /&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16750/feed&quot;
        target=&quot;_blank&quot;&gt;TIM SCHILLING&lt;/a&gt;&lt;/span&gt; &lt;/p&gt;
        &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16768/feed&quot;
        target=&quot;_blank&quot;&gt;Secure Your Code, Wherever, or However You Write
        It&lt;/a&gt;&lt;/h3&gt; &lt;a href=&quot;https://pycoders.com/link/16768/feed&quot;
        target=&quot;_blank&quot;&gt;&lt;img src=&quot;https://cdn.pycoders.com/0fafca54f5a6be369b399de6d2919c7b&quot;
        alt=&quot;alt&quot; /&gt;&lt;/a&gt; &lt;p&gt; AI coding agents have blind
        spots, they reproduce patterns but struggle with security context. AURI by
        Endor Labs plugs into your editor via MCP, catching flaws, signaling exposed
        secrets, and spotting malicious dependencies. Ship secure by default. &lt;a
        href=&quot;https://pycoders.com/link/16768/feed&quot; target=&quot;_blank&quot;&gt;Try
        AURI Free \u2192&lt;/a&gt;&lt;br /&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16768/feed&quot;
        target=&quot;_blank&quot;&gt;ENDOR LABS&lt;/a&gt;&lt;/span&gt; &lt;span&gt;sponsor&lt;/span&gt;
        &lt;/p&gt; &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16744/feed&quot;
        target=&quot;_blank&quot;&gt;Testing MCP Servers With a Python MCP Client&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; Learn how to build a Python MCP client that tests MCP servers from
        your terminal. List their tools, prompts, and resources, then call each one.&lt;br
        /&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16744/feed&quot;
        target=&quot;_blank&quot;&gt;REAL PYTHON&lt;/a&gt;&lt;/span&gt; &lt;span&gt;course&lt;/span&gt;
        &lt;/p&gt; &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16741/feed&quot;
        target=&quot;_blank&quot;&gt;Quiz: Testing MCP Servers With a Python MCP Client&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16741/feed&quot;
        target=&quot;_blank&quot;&gt;REAL PYTHON&lt;/a&gt;&lt;/span&gt; &lt;/p&gt;
        &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16751/feed&quot;
        target=&quot;_blank&quot;&gt;PEP 797: Shared Object Proxies (Rejected)&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16751/feed&quot;
        target=&quot;_blank&quot;&gt;PYTHON.ORG&lt;/a&gt;&lt;/span&gt; &lt;/p&gt;
        &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16747/feed&quot;
        target=&quot;_blank&quot;&gt;Django Security Releases Issued: 6.0.7 and 5.2.16&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16747/feed&quot;
        target=&quot;_blank&quot;&gt;DJANGO SOFTWARE FOUNDATION&lt;/a&gt;&lt;/span&gt;
        &lt;/p&gt; &lt;/div&gt; &lt;h2&gt;Articles &amp;amp; Tutorials&lt;/h2&gt;
        &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16759/feed&quot;
        target=&quot;_blank&quot;&gt;Constructing and Judging Modern Agentic Workflows&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; How can you improve your LLM agent systems through specification
        enrichment? What are the advantages of having an LLM act as a judge within
        an agent system? This week on the show, Senior IEEE Member and Quality Engineer
        Suneet Malhotra joins us to discuss building and evaluating agentic architecture.&lt;br
        /&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16759/feed&quot;
        target=&quot;_blank&quot;&gt;REAL PYTHON&lt;/a&gt;&lt;/span&gt; &lt;span&gt;podcast&lt;/span&gt;
        &lt;/p&gt; &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16765/feed&quot;
        target=&quot;_blank&quot;&gt;What &lt;code&gt;for x in y&lt;/code&gt; Hides
        From You&lt;/a&gt;&lt;/h3&gt; &lt;p&gt; An explanation of how Python\u2019s
        &lt;code&gt;for x in y&lt;/code&gt; syntax is a thin wrapper around the iterator
        protocol: &lt;code&gt;iter(...)&lt;/code&gt;, &lt;code&gt;next(...)&lt;/code&gt;,
        and &lt;code&gt;StopIteration&lt;/code&gt;. Using examples from Memphis, a
        Python interpreter written in Rust, it shows how this design makes lists,
        ranges, and generators feel unified rather than magical.&lt;br /&gt; &lt;span&gt;&lt;a
        href=&quot;https://pycoders.com/link/16765/feed&quot; target=&quot;_blank&quot;&gt;TYLER
        GREEN&lt;/a&gt; \u2022 Shared by Tyler Green&lt;/span&gt; &lt;/p&gt; &lt;/div&gt;
        &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16767/feed&quot;
        target=&quot;_blank&quot;&gt;Stop stitching 5 different systems together for
        your agents.&lt;/a&gt;&lt;/h3&gt; &lt;a href=&quot;https://pycoders.com/link/16767/feed&quot;
        target=&quot;_blank&quot;&gt;&lt;img src=&quot;https://cdn.pycoders.com/5be1f986dec8f247515673d049711de2&quot;
        alt=&quot;alt&quot; /&gt;&lt;/a&gt; &lt;p&gt; Dev teams spend weeks fitting
        together vector DBs, graph DBs, relational stores, filesystem primitives and
        optimizing cache. How about everything via a single API? P90 sub-200ms recall
        - the fastest graph database to unlock true agent memory, knowledge graphs
        and user-personalization. &lt;a href=&quot;https://pycoders.com/link/16767/feed&quot;
        target=&quot;_blank&quot;&gt;Click Here to Try HydraDB Out for Free&lt;/a&gt;&lt;br
        /&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16767/feed&quot;
        target=&quot;_blank&quot;&gt;HYDRADB&lt;/a&gt;&lt;/span&gt; &lt;span&gt;sponsor&lt;/span&gt;
        &lt;/p&gt; &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16748/feed&quot;
        target=&quot;_blank&quot;&gt;Building a Fast HTML Toolkit in C for Python&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; &lt;code&gt;turbohtml&lt;/code&gt; began as a patch to speed up
        &lt;code&gt;html.escape&lt;/code&gt; and &lt;code&gt;html.unescape&lt;/code&gt;
        in CPython. When the core team declined to maintain SIMD in the standard library,
        it became a third party library instead. This post is its story.&lt;br /&gt;
        &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16748/feed&quot; target=&quot;_blank&quot;&gt;BERN\xC1T
        G\xC1BOR&lt;/a&gt; \u2022 Shared by Bern\xE1t G\xE1bor&lt;/span&gt; &lt;/p&gt;
        &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16757/feed&quot;
        target=&quot;_blank&quot;&gt;How to Publish to PyPI Using GitHub Actions Securely&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; If you&amp;rsquo;re using GitHub Actions to publish your Python
        libraries, this article is for you. Learn what are the best practices to ensure
        the process is secure and what tools you can use to validate it.&lt;br /&gt;
        &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16757/feed&quot; target=&quot;_blank&quot;&gt;BRETT
        CANNON&lt;/a&gt;&lt;/span&gt; &lt;/p&gt; &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a
        href=&quot;https://pycoders.com/link/16738/feed&quot; target=&quot;_blank&quot;&gt;Python
        3.15&amp;rsquo;s Ultra-Low Overhead Interpreter Profiling Mode&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; Ken is one of the key contributors to the experimental JIT. This
        post talks about how Python 3.15\u2019s interpreter profiling mode is helping
        them figure out what is working with the JIT and what isn&amp;rsquo;t.&lt;br
        /&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16738/feed&quot;
        target=&quot;_blank&quot;&gt;KEN JIN&lt;/a&gt;&lt;/span&gt; &lt;/p&gt; &lt;/div&gt;
        &lt;div&gt; &lt;h3&gt;&lt;a href=&quot;https://pycoders.com/link/16766/feed&quot;
        target=&quot;_blank&quot;&gt;PEP 814: Add Frozendict Built-in Type&lt;/a&gt;&lt;/h3&gt;
        &lt;p&gt; Victor has been involved in multiple attempts to add a frozen dict
        type to Python. His latest PEP has been accepted and frozen dictionaries will
        be added to Python 3.15. This post is his story.&lt;br /&gt; &lt;span&gt;&lt;a
        href=&quot;https://pycoders.com/link/16766/feed&quot; target=&quot;_blank&quot;&gt;VICTOR
        STINNER&lt;/a&gt;&lt;/span&gt; &lt;/p&gt; &lt;/div&gt; &lt;div&gt; &lt;h3&gt;&lt;a
        href=&quot;https://pycoders.com/link/16753/feed&quot; target=&quot;_blank&quot;&gt;How
        to Clean Messy CSV Files With Python&lt;/a&gt;&lt;/h3&gt; &lt;p&gt; This introductory
        article shows you how to do data cleaning on CSV files using pandas, including
        dealing with duplicate rows, missing values, mixed date formats, and more.&lt;br
        /&gt; &lt;span&gt;&lt;a href=&quot;https://pycoders.com/link/16753/feed&quot;
        target=&quot;_blank&quot;&gt;ABID ALI AWAN,&lt;/a&gt;&lt;/span&gt; &lt;/p&gt;
